<body class="bg-slate-50 text-slate-800">

    <script type="text/babel">
        const { useState, Fragment, useEffect, useRef } = React;

        // --- Inline SVG Icons (แทนที่ lucide-react เพื่อให้ทำงานใน HTML ไฟล์เดียวได้) ---
        const SvgIcon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const FileText = ({ className }) => <SvgIcon className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></SvgIcon>;
        const Search = ({ className }) => <SvgIcon className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></SvgIcon>;
        const ArrowLeft = ({ className }) => <SvgIcon className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></SvgIcon>;
        const Package = ({ className }) => <SvgIcon className={className}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></SvgIcon>;
        const Calendar = ({ className }) => <SvgIcon className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></SvgIcon>;
        const MapPin = ({ className }) => <SvgIcon className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></SvgIcon>;
        const CheckCircle = ({ className }) => <SvgIcon className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></SvgIcon>;
        const Clock = ({ className }) => <SvgIcon className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SvgIcon>;
        const Eye = ({ className }) => <SvgIcon className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></SvgIcon>;
        const Plus = ({ className }) => <SvgIcon className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></SvgIcon>;
        const X = ({ className }) => <SvgIcon className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></SvgIcon>;
        const Edit = ({ className }) => <SvgIcon className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></SvgIcon>;
        const Trash2 = ({ className }) => <SvgIcon className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></SvgIcon>;
        const UploadCloud = ({ className }) => <SvgIcon className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></SvgIcon>;
        const FileSpreadsheet = ({ className }) => <SvgIcon className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></SvgIcon>;
        const Loader2 = ({ className }) => <SvgIcon className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></SvgIcon>;
        const ChevronDown = ({ className }) => <SvgIcon className={className}><polyline points="6 9 12 15 18 9"/></SvgIcon>;
        const ChevronRight = ({ className }) => <SvgIcon className={className}><polyline points="9 18 15 12 9 6"/></SvgIcon>;
        const PlusCircle = ({ className }) => <SvgIcon className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></SvgIcon>;
        const MoreVertical = ({ className }) => <SvgIcon className={className}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></SvgIcon>;
        const PieChart = ({ className }) => <SvgIcon className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></SvgIcon>;
        const ChevronsDown = ({ className }) => <SvgIcon className={className}><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></SvgIcon>;
        const ChevronsUp = ({ className }) => <SvgIcon className={className}><polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/></SvgIcon>;
        const Save = ({ className }) => <SvgIcon className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></SvgIcon>;
        const Paperclip = ({ className }) => <SvgIcon className={className}><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></SvgIcon>;
        const Camera = ({ className }) => <SvgIcon className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></SvgIcon>;
        const ImageIcon = ({ className }) => <SvgIcon className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></SvgIcon>;

        // --- Mock Data ---
        const INITIAL_DOCUMENTS = [
            {
                id: 'TR-2567-0001',
                date: '2024-12-29',
                destination: 'สอจ.วิเชียรบุรี',
                status: 'completed',
                creator: 'เจ้าหน้าที่',
                notes: 'จัดสรรงบประมาณ 29006630001004100281',
                attachedFile: null
            },
            {
                id: 'TR-2567-0002',
                date: '2024-03-05',
                destination: 'สาขาเชียงใหม่',
                status: 'pending',
                creator: 'สมชาย ใจดี',
                notes: 'ส่งคอมพิวเตอร์ทดแทนเครื่องที่ชำรุด',
                attachedFile: null
            }
        ];

        const INITIAL_EQUIPMENT_GROUPS = [
            {
                id: 'g-1',
                docId: 'TR-2567-0001',
                title: 'รายการ ชุดโต๊ะทำงาน เก้าอี้ทำงาน และเก้าอี้หน้าโต๊ะ ระดับชำนาญการ ระดับชำนาญงาน ระดับปฏิบัติการและระดับปฏิบัติงาน',
                items: [
                { 
                    id: 'i-1-1', description: 'ชุดโต๊ะทำงาน และเก้าอี้ทำงานระดับปฏิบัติการ จำนวน 1 ชุด', price: 12300, itemStatus: 'purchased',
                    assets: [{ id: 'a-1', assetNumber: 'OF-67-001', assetName: 'ชุดโต๊ะทำงานและเก้าอี้', image: null, status: 'purchased' }]
                },
                { 
                    id: 'i-1-2', description: 'เก้าอี้หน้าโต๊ะระดับชำนาญการ (CH-12) จำนวน 6 ตัว', price: 7800, itemStatus: 'pending',
                    assets: [
                    { id: 'a-2', assetNumber: 'OF-67-002', assetName: 'เก้าอี้หน้าโต๊ะ ตัวที่ 1', image: null, status: 'purchased' },
                    { id: 'a-3', assetNumber: 'OF-67-003', assetName: 'เก้าอี้หน้าโต๊ะ ตัวที่ 2', image: null, status: 'purchased' },
                    { id: 'a-4', assetNumber: 'OF-67-004', assetName: 'เก้าอี้หน้าโต๊ะ ตัวที่ 3', image: null, status: 'purchased' },
                    { id: 'a-5', assetNumber: 'OF-67-005', assetName: 'เก้าอี้หน้าโต๊ะ ตัวที่ 4', image: null, status: 'pending' },
                    { id: 'a-6', assetNumber: 'OF-67-006', assetName: 'เก้าอี้หน้าโต๊ะ ตัวที่ 5', image: null, status: 'pending' },
                    { id: 'a-7', assetNumber: 'OF-67-007', assetName: 'เก้าอี้หน้าโต๊ะ ตัวที่ 6', image: null, status: 'pending' },
                    ]
                },
                { id: 'i-1-3', description: 'เก้าอี้หน้าโต๊ะระดับชำนาญงาน (CH-12) จำนวน 4 ตัว', price: 5200, itemStatus: 'pending', assets: [] },
                { id: 'i-1-4', description: 'เก้าอี้หน้าโต๊ะระดับปฏิบัติการ (CH-12) จำนวน 2 ตัว', price: 2600, itemStatus: 'pending', assets: [] },
                ]
            },
            {
                id: 'g-2',
                docId: 'TR-2567-0001',
                title: 'รายการ เครื่องถ่ายเอกสาร ระบบดิจิทัล (ขาว-ดำ) ความเร็ว 50 แผ่นต่อนาที',
                items: [
                { id: 'i-2-1', description: 'เครื่องถ่ายเอกสาร ระบบดิจิทัล (ขาว-ดำ) ความเร็ว 50 แผ่นต่อนาที จำนวน 1 เครื่อง', price: 188000, itemStatus: 'pending', assets: [] }
                ]
            }
        ];

        // --- Helper Components ---
        const StatusBadge = ({ status }) => {
            if (status === 'completed') {
                return <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800"><CheckCircle className="w-3 h-3 mr-1" /> โอนจัดสรรแล้ว</span>;
            } else if (status === 'pending') {
                return <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"><Clock className="w-3 h-3 mr-1" /> อยู่ระหว่างดำเนินการ</span>;
            } else if (status === 'untransferred') {
                return <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800"><X className="w-3 h-3 mr-1" /> ยังไม่โอนจัดสรร</span>;
            }
            return null;
        };

        const SemiCircleGauge = ({ percent, color }) => {
            const radius = 40;
            const circumference = Math.PI * radius;
            const strokeDashoffset = circumference - (percent / 100) * circumference;

            return (
                <div className="relative flex flex-col items-center justify-center w-36 h-24">
                <svg className="w-full h-full overflow-visible" viewBox="0 0 100 55">
                    <path d="M 10,45 A 40,40 0 0,1 90,45" fill="none" stroke="#e5e7eb" strokeWidth="10" strokeLinecap="round" />
                    <path 
                    d="M 10,45 A 40,40 0 0,1 90,45" 
                    fill="none" 
                    stroke={color} 
                    strokeWidth="10" 
                    strokeLinecap="round" 
                    strokeDasharray={circumference} 
                    strokeDashoffset={strokeDashoffset} 
                    className="transition-all duration-1000 ease-out" 
                    />
                </svg>
                <div className="absolute bottom-1 flex flex-col items-center">
                    <span className="text-3xl font-black text-gray-900">{percent}%</span>
                </div>
                </div>
            );
        };

        const loadSheetJS = () => {
            return new Promise((resolve, reject) => {
                if (window.XLSX) return resolve(window.XLSX);
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
                script.onload = () => resolve(window.XLSX);
                script.onerror = reject;
                document.body.appendChild(script);
            });
        };

        // --- Main Application Component ---
        function App() {
            const [currentView, setCurrentView] = useState('list');
            const [selectedDocId, setSelectedDocId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            
            const [documents, setDocuments] = useState(INITIAL_DOCUMENTS);
            const [equipmentGroups, setEquipmentGroups] = useState(INITIAL_EQUIPMENT_GROUPS);
            const [expandedGroups, setExpandedGroups] = useState(['g-1', 'g-2', 'g-3']);
            const [expandedSubItems, setExpandedSubItems] = useState([]);

            const [isCreateModalOpen, setIsCreateModalOpen] = useState(false);
            const [createMode, setCreateMode] = useState('manual');
            const [formData, setFormData] = useState({ id: '', date: '', destination: '' });
            
            const [isGroupModalOpen, setIsGroupModalOpen] = useState(false);
            const [groupCreateMode, setGroupCreateMode] = useState('manual'); // 'manual' | 'excel'
            const [editingGroup, setEditingGroup] = useState(null); 
            const [groupFormData, setGroupFormData] = useState({ title: '' });
            const [groupFile, setGroupFile] = useState(null);
            const [isGroupParsing, setIsGroupParsing] = useState(false);
            const [parsedGroups, setParsedGroups] = useState(null);

            const [isSubItemModalOpen, setIsSubItemModalOpen] = useState(false);
            const [targetGroupId, setTargetGroupId] = useState(null);
            const [editingSubItem, setEditingSubItem] = useState(null); 
            const [subItemFormData, setSubItemFormData] = useState({ description: '', price: '', itemStatus: 'pending', assets: [] });

            const [subItemCreateMode, setSubItemCreateMode] = useState('manual'); 
            const [subItemFile, setSubItemFile] = useState(null);
            const [isSubItemParsing, setIsSubItemParsing] = useState(false);
            const [parsedSubItems, setParsedSubItems] = useState(null);

            const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, type: null, groupId: null, itemId: null });
            const [activeMenu, setActiveMenu] = useState(null);
            const [assetImagePreview, setAssetImagePreview] = useState({ isOpen: false, imageUrl: null, title: '' });

            const [selectedFile, setSelectedFile] = useState(null);
            const [isParsing, setIsParsing] = useState(false);
            const [parsedData, setParsedData] = useState(null);

            const [isSavingDoc, setIsSavingDoc] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);

            // Search filter
            const filteredDocs = documents.filter(doc => {
                const lowerSearch = searchTerm.toLowerCase();
                const matchDocFields = 
                doc.id.toLowerCase().includes(lowerSearch) ||
                doc.destination.toLowerCase().includes(lowerSearch) ||
                (doc.notes && doc.notes.toLowerCase().includes(lowerSearch));
                
                const docGroups = equipmentGroups.filter(g => g.docId === doc.id);
                const matchGroupsOrItems = docGroups.some(group => {
                if (group.title.toLowerCase().includes(lowerSearch)) return true;
                return group.items.some(item => {
                    if (item.description.toLowerCase().includes(lowerSearch)) return true;
                    if (item.assets && item.assets.some(a => a.assetNumber.toLowerCase().includes(lowerSearch))) return true;
                    return false;
                });
                });
                return matchDocFields || matchGroupsOrItems;
            });

            const selectedDocument = documents.find(doc => doc.id === selectedDocId);
            const relatedGroups = equipmentGroups.filter(g => g.docId === selectedDocId);

            const handleViewDocument = (id) => {
                setSelectedDocId(id);
                setCurrentView('detail');
                setSaveSuccess(false); 
                const groupsInDoc = equipmentGroups.filter(g => g.docId === id).map(g => g.id);
                setExpandedGroups(groupsInDoc);
                setExpandedSubItems([]);
            };

            const handleBackToList = () => {
                setSelectedDocId(null);
                setCurrentView('list');
                setSaveSuccess(false);
            };

            const handleStatusChange = (id, newStatus) => {
                setDocuments(prevDocs => prevDocs.map(doc => doc.id === id ? { ...doc, status: newStatus } : doc));
            };

            const handleSaveDocumentDetail = () => {
                setIsSavingDoc(true);
                setSaveSuccess(false);
                setTimeout(() => {
                setIsSavingDoc(false);
                setSaveSuccess(true);
                setTimeout(() => { setSaveSuccess(false); }, 3000);
                }, 800);
            };

            const handleAttachFileToDocument = (e) => {
                const file = e.target.files[0];
                if (file && selectedDocId) {
                setDocuments(prevDocs => prevDocs.map(doc => doc.id === selectedDocId ? { ...doc, attachedFile: file.name } : doc));
                }
            };

            const toggleGroupExpand = (groupId) => {
                setExpandedGroups(prev => prev.includes(groupId) ? prev.filter(id => id !== groupId) : [...prev, groupId]);
            };

            const toggleSubItemExpand = (itemId) => {
                setExpandedSubItems(prev => prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]);
            };

            const handleOpenAddGroup = () => {
                setEditingGroup(null);
                setGroupFormData({ title: '' });
                setGroupCreateMode('manual');
                setGroupFile(null);
                setParsedGroups(null);
                setIsGroupModalOpen(true);
                setActiveMenu(null);
            };

            const handleOpenEditGroup = (group, e) => {
                e.stopPropagation(); 
                setEditingGroup(group);
                setGroupFormData({ title: group.title });
                setGroupCreateMode('manual');
                setIsGroupModalOpen(true);
                setActiveMenu(null);
            };

            const handleDeleteGroup = (groupId, e) => {
                e.stopPropagation();
                setDeleteConfirm({ isOpen: true, type: 'group', groupId, itemId: null });
                setActiveMenu(null);
            };

            const handleSaveGroup = (e) => {
                e.preventDefault();
                if (editingGroup) {
                setEquipmentGroups(prev => prev.map(g => g.id === editingGroup.id ? { ...g, title: groupFormData.title } : g));
                } else {
                const newGroup = { id: `g-${Date.now()}`, docId: selectedDocId, title: groupFormData.title, items: [] };
                setEquipmentGroups([...equipmentGroups, newGroup]);
                setExpandedGroups([...expandedGroups, newGroup.id]); 
                }
                setIsGroupModalOpen(false);
            };

            const handleGroupFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setGroupFile(file);
                setIsGroupParsing(true);
                
                try {
                const XLSX = await loadSheetJS();
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    
                    const parsedGroups = [];
                    let currentGroup = null;

                    rows.forEach((row) => {
                    if (!row || row.length === 0) return;
                    
                    let textStr = '';
                    let textColIndex = -1;
                    for(let i=0; i<Math.min(row.length, 5); i++) {
                        if (typeof row[i] === 'string' && row[i].trim() !== '') {
                            textStr = row[i].trim();
                            textColIndex = i;
                            break;
                        }
                    }
                    if (!textStr) return;

                    let priceVal = 0;
                    for(let i=textColIndex+1; i<row.length; i++) {
                        if (row[i] !== null && row[i] !== undefined && !isNaN(parseFloat(row[i]))) {
                            priceVal = parseFloat(row[i]);
                            break;
                        }
                    }

                    const isGroupMatch = /^\d+\./.test(textStr);
                    const isSubItemMatch = /^-/.test(textStr);

                    if (isGroupMatch || (!isSubItemMatch && !currentGroup)) {
                        currentGroup = { title: textStr, items: [] };
                        parsedGroups.push(currentGroup);
                    } else if (isSubItemMatch && currentGroup) {
                        let assetRaw = '';
                        if (textColIndex > 0) assetRaw = String(row[0]||'').trim();
                        let desc = textStr;
                        if (desc.startsWith('-')) desc = desc.substring(1).trim();
                        currentGroup.items.push({ assetNumberRaw: assetRaw, description: desc, price: priceVal, itemStatus: 'pending' });
                    }
                    });
                    
                    setParsedGroups(parsedGroups);
                    setIsGroupParsing(false);
                };
                reader.readAsArrayBuffer(file);
                } catch (err) {
                console.error(err);
                alert('เกิดข้อผิดพลาดในการอ่านไฟล์ Excel');
                setIsGroupParsing(false);
                }
            };

            const handleExcelGroupSubmit = () => {
                if (!parsedGroups) return;
                
                const newGroups = parsedGroups.map((g, idx) => ({
                id: `g-${Date.now()}-${idx}`,
                docId: selectedDocId,
                title: g.title,
                items: g.items.map((item, iIdx) => {
                    const initialAssets = item.assetNumberRaw ? [{ id: `a-ex-${Date.now()}-${idx}-${iIdx}`, assetNumber: item.assetNumberRaw, assetName: '', image: null, status: 'pending' }] : [];
                    return {
                    id: `i-ex-${Date.now()}-${idx}-${iIdx}`,
                    description: item.description,
                    price: Number(item.price),
                    itemStatus: item.itemStatus,
                    assets: initialAssets
                    };
                })
                }));

                setEquipmentGroups([...equipmentGroups, ...newGroups]);
                setExpandedGroups([...expandedGroups, ...newGroups.map(g => g.id)]);
                setIsGroupModalOpen(false);
            };

            const handleOpenAddSubItem = (groupId, e) => {
                e.stopPropagation();
                setTargetGroupId(groupId);
                setEditingSubItem(null);
                setSubItemFormData({ description: '', price: '', itemStatus: 'pending', assets: [] });
                setSubItemCreateMode('manual');
                setSubItemFile(null);
                setParsedSubItems(null);
                setIsSubItemModalOpen(true);
                setActiveMenu(null);
                if (!expandedGroups.includes(groupId)) setExpandedGroups([...expandedGroups, groupId]);
            };

            const handleOpenEditSubItem = (groupId, item, e) => {
                e.stopPropagation();
                setTargetGroupId(groupId);
                setEditingSubItem(item);
                setSubItemFormData({ 
                description: item.description, 
                price: item.price, 
                itemStatus: item.itemStatus || 'pending',
                assets: item.assets ? item.assets.map(a => ({...a, status: a.status || 'pending'})) : []
                });
                setSubItemCreateMode('manual'); 
                setIsSubItemModalOpen(true);
                setActiveMenu(null);
            };

            const closeSubItemModal = () => {
                setIsSubItemModalOpen(false);
                setSubItemCreateMode('manual');
                setSubItemFile(null);
                setParsedSubItems(null);
            };

            const handleDeleteSubItem = (groupId, itemId, e) => {
                e.stopPropagation();
                setDeleteConfirm({ isOpen: true, type: 'sub', groupId, itemId });
                setActiveMenu(null);
            };

            const executeDelete = () => {
                if (deleteConfirm.type === 'group') {
                setEquipmentGroups(prev => prev.filter(g => g.id !== deleteConfirm.groupId));
                } else if (deleteConfirm.type === 'sub') {
                setEquipmentGroups(prev => prev.map(g => {
                    if (g.id === deleteConfirm.groupId) return { ...g, items: g.items.filter(i => i.id !== deleteConfirm.itemId) };
                    return g;
                }));
                }
                setDeleteConfirm({ isOpen: false, type: null, groupId: null, itemId: null });
            };

            const handleAddAssetToForm = () => {
                setSubItemFormData(prev => ({
                ...prev,
                assets: [...prev.assets, { id: `a-${Date.now()}`, assetNumber: '', assetName: '', image: null, status: 'pending' }]
                }));
            };

            const handleUpdateAssetInForm = (id, field, value) => {
                setSubItemFormData(prev => ({
                ...prev,
                assets: prev.assets.map(a => a.id === id ? { ...a, [field]: value } : a)
                }));
            };

            const handleRemoveAssetFromForm = (id) => {
                setSubItemFormData(prev => ({
                ...prev,
                assets: prev.assets.filter(a => a.id !== id)
                }));
            };

            const handleImageUploadInForm = (id, e) => {
                const file = e.target.files[0];
                if (file) {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    handleUpdateAssetInForm(id, 'image', evt.target.result);
                };
                reader.readAsDataURL(file); 
                }
            };

            const handleSaveSubItem = (e) => {
                e.preventDefault();
                setEquipmentGroups(prev => prev.map(g => {
                if (g.id === targetGroupId) {
                    const finalItemStatus = subItemFormData.assets.length > 0
                    ? (subItemFormData.assets.every(a => a.status === 'purchased') ? 'purchased' : 'pending')
                    : subItemFormData.itemStatus;

                    if (editingSubItem) {
                    return {
                        ...g,
                        items: g.items.map(i => i.id === editingSubItem.id ? { 
                        ...i, 
                        description: subItemFormData.description, 
                        price: Number(subItemFormData.price), 
                        itemStatus: finalItemStatus,
                        assets: subItemFormData.assets 
                        } : i)
                    };
                    } else {
                    const newItem = {
                        id: `i-${Date.now()}`,
                        description: subItemFormData.description,
                        price: Number(subItemFormData.price),
                        itemStatus: finalItemStatus,
                        assets: subItemFormData.assets
                    };
                    return { ...g, items: [...g.items, newItem] };
                    }
                }
                return g;
                }));
                closeSubItemModal();
            };

            const handleSubItemFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setSubItemFile(file);
                setIsSubItemParsing(true);
                
                try {
                const XLSX = await loadSheetJS();
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    
                    const parsedItems = [];
                    rows.forEach((row) => {
                    if (!row || row.length === 0) return;
                    let textStr = '';
                    let textColIndex = -1;
                    for(let i=0; i<Math.min(row.length, 5); i++) {
                        if (typeof row[i] === 'string' && row[i].trim() !== '') {
                            textStr = row[i].trim();
                            textColIndex = i;
                            break;
                        }
                    }
                    if (!textStr) return;

                    let priceVal = 0;
                    for(let i=textColIndex+1; i<row.length; i++) {
                        if (row[i] !== null && row[i] !== undefined && !isNaN(parseFloat(row[i]))) {
                            priceVal = parseFloat(row[i]);
                            break;
                        }
                    }

                    let assetRaw = '';
                    if (textColIndex > 0) assetRaw = String(row[0]||'').trim();
                    let desc = textStr;
                    if (desc.startsWith('-')) desc = desc.substring(1).trim();

                    parsedItems.push({
                        assetNumberRaw: assetRaw,
                        description: desc,
                        price: priceVal,
                        itemStatus: 'pending'
                    });
                    });
                    setParsedSubItems(parsedItems);
                    setIsSubItemParsing(false);
                };
                reader.readAsArrayBuffer(file);
                } catch (err) {
                console.error(err);
                alert('เกิดข้อผิดพลาดในการอ่านไฟล์ Excel');
                setIsSubItemParsing(false);
                }
            };

            const handleExcelSubItemSubmit = (e) => {
                e.preventDefault();
                if (!parsedSubItems) return;
                const newItems = parsedSubItems.map((item, index) => {
                const initialAssets = item.assetNumberRaw 
                    ? [{ id: `a-ex-${Date.now()}-${index}`, assetNumber: item.assetNumberRaw, assetName: '', image: null, status: 'pending' }]
                    : [];
                return {
                    id: `i-ex-${Date.now()}-${index}`,
                    description: item.description,
                    price: Number(item.price),
                    itemStatus: item.itemStatus,
                    assets: initialAssets
                };
                });
                setEquipmentGroups(prev => prev.map(g => {
                if (g.id === targetGroupId) return { ...g, items: [...g.items, ...newItems] };
                return g;
                }));
                closeSubItemModal();
            };

            const closeCreateModal = () => {
                setIsCreateModalOpen(false);
                setCreateMode('manual');
                setSelectedFile(null);
                setParsedData(null);
                setFormData({ id: '', date: '', destination: '' });
            };

            const handleCreateSubmit = (e) => {
                e.preventDefault();
                if (!formData.id || !formData.date || !formData.destination) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                return;
                }
                const newDoc = { id: formData.id, date: formData.date, destination: formData.destination, status: 'untransferred', creator: 'ผู้ใช้ระบบ', notes: '-', attachedFile: null };
                setDocuments([newDoc, ...documents]);
                closeCreateModal();
                handleViewDocument(newDoc.id);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setSelectedFile(file);
                setIsParsing(true);
                try {
                const XLSX = await loadSheetJS();
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    
                    const parsedGroups = [];
                    let currentGroup = null;

                    rows.forEach((row) => {
                    if (!row || row.length === 0) return;
                    
                    let textStr = '';
                    let textColIndex = -1;
                    for(let i=0; i<Math.min(row.length, 5); i++) {
                        if (typeof row[i] === 'string' && row[i].trim() !== '') {
                            textStr = row[i].trim();
                            textColIndex = i;
                            break;
                        }
                    }
                    if (!textStr) return;

                    let priceVal = 0;
                    for(let i=textColIndex+1; i<row.length; i++) {
                        if (row[i] !== null && row[i] !== undefined && !isNaN(parseFloat(row[i]))) {
                            priceVal = parseFloat(row[i]);
                            break;
                        }
                    }

                    const isGroupMatch = /^\d+\./.test(textStr);
                    const isSubItemMatch = /^-/.test(textStr);

                    if (isGroupMatch || (!isSubItemMatch && !currentGroup)) {
                        currentGroup = { title: textStr, items: [] };
                        parsedGroups.push(currentGroup);
                    } else if (isSubItemMatch && currentGroup) {
                        let assetRaw = '';
                        if (textColIndex > 0) assetRaw = String(row[0]||'').trim();
                        let desc = textStr;
                        if (desc.startsWith('-')) desc = desc.substring(1).trim();
                        currentGroup.items.push({ assetNumberRaw: assetRaw, description: desc, price: priceVal, itemStatus: 'pending' });
                    }
                    });

                    setParsedData({ id: `TR-EX-${Math.floor(1000 + Math.random() * 9000)}`, date: new Date().toISOString().split('T')[0], destination: 'รอระบุปลายทาง', groups: parsedGroups });
                    setIsParsing(false);
                };
                reader.readAsArrayBuffer(file);
                } catch (err) {
                console.error(err);
                alert('เกิดข้อผิดพลาดในการอ่านไฟล์ Excel');
                setIsParsing(false);
                }
            };

            const handleExcelSubmit = (e) => {
                e.preventDefault();
                if (!parsedData) return;
                const newDoc = { id: parsedData.id, date: parsedData.date, destination: parsedData.destination, status: 'untransferred', creator: 'ผู้ใช้ระบบ', notes: `นำเข้าจากไฟล์: ${selectedFile?.name}`, attachedFile: null };
                
                const newGroups = parsedData.groups.map((g, gIdx) => ({
                id: `g-${Date.now()}-${gIdx}`,
                docId: newDoc.id,
                title: g.title,
                items: g.items.map((item, iIdx) => {
                    const initialAssets = item.assetNumberRaw ? [{ id: `a-ex-${Date.now()}-${gIdx}-${iIdx}`, assetNumber: item.assetNumberRaw, assetName: '', image: null, status: 'pending' }] : [];
                    return {
                    id: `i-ex-${Date.now()}-${gIdx}-${iIdx}`,
                    description: item.description,
                    price: Number(item.price),
                    itemStatus: item.itemStatus,
                    assets: initialAssets
                    };
                })
                }));

                setDocuments([newDoc, ...documents]);
                setEquipmentGroups([...equipmentGroups, ...newGroups]);
                setExpandedGroups([...expandedGroups, ...newGroups.map(g => g.id)]);
                closeCreateModal();
                handleViewDocument(newDoc.id);
            };

            // --- Views ---

            const GroupModal = () => {
                if (!isGroupModalOpen) return null;
                return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-50 px-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in-95 duration-200 flex flex-col max-h-[90vh]">
                    <div className="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50 shrink-0">
                        <h3 className="text-lg font-bold text-gray-800">{editingGroup ? 'แก้ไขหัวข้อหลัก' : 'เพิ่มหัวข้อหลักใหม่'}</h3>
                        <button onClick={() => setIsGroupModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X className="w-5 h-5" /></button>
                    </div>
                    
                    {!editingGroup && (
                        <div className="flex border-b border-gray-200 shrink-0">
                        <button onClick={() => setGroupCreateMode('manual')} className={`flex-1 py-3 text-sm font-medium border-b-2 transition-colors ${groupCreateMode === 'manual' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>กรอกข้อมูลเอง</button>
                        <button onClick={() => setGroupCreateMode('excel')} className={`flex-1 py-3 text-sm font-medium border-b-2 flex items-center justify-center gap-2 ${groupCreateMode === 'excel' ? 'border-green-600 text-green-600' : 'border-transparent text-gray-500'}`}><FileSpreadsheet className="w-4 h-4" /> อัปโหลดไฟล์ Excel</button>
                        </div>
                    )}

                    <div className="overflow-y-auto p-6">
                        {groupCreateMode === 'manual' ? (
                        <form id="group-form" onSubmit={handleSaveGroup} className="space-y-4">
                            <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อหัวข้อหลัก</label>
                            <textarea required className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 min-h-[100px]" placeholder="เช่น 1. รายการ ชุดโต๊ะทำงาน เก้าอี้ทำงาน..." value={groupFormData.title} onChange={(e) => setGroupFormData({...groupFormData, title: e.target.value})} />
                            </div>
                        </form>
                        ) : (
                        <div className="space-y-6">
                            {!parsedGroups ? (
                            <div className="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center relative bg-white">
                                <input type="file" accept=".xlsx, .xls, .csv" onChange={handleGroupFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                {isGroupParsing ? (
                                <div className="flex flex-col items-center text-blue-600"><Loader2 className="w-10 h-10 animate-spin mb-3" /><p className="font-medium">กำลังอ่านข้อมูล...</p></div>
                                ) : (
                                <div className="flex flex-col items-center text-gray-500">
                                    <UploadCloud className="w-12 h-12 text-gray-400 mb-3" />
                                    <p className="text-lg font-medium text-gray-700 mb-1">คลิกเพื่อเลือกไฟล์ Excel</p>
                                    <p className="text-xs text-blue-500 mt-2 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">รูปแบบ: คอลัมน์ A คือชื่อหัวข้อหลัก</p>
                                </div>
                                )}
                            </div>
                            ) : (
                            <div className="space-y-4 animate-in fade-in">
                                <div className="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-start gap-3">
                                <FileSpreadsheet className="w-5 h-5 mt-0.5" />
                                <div className="flex-1">
                                    <p className="font-medium">พบ {parsedGroups.length} รายการหัวข้อหลัก ({parsedGroups.reduce((acc, g) => acc + g.items.length, 0)} รายการย่อย)</p>
                                    <p className="text-sm opacity-80">คลิกปุ่มนำเข้าด้านล่างเพื่อเริ่มสร้างหัวข้อทั้งหมด</p>
                                </div>
                                <button onClick={() => { setParsedGroups(null); setGroupFile(null); }} className="text-sm text-green-700 underline font-medium">เปลี่ยนไฟล์</button>
                                </div>
                                <div className="border border-gray-200 rounded-lg overflow-hidden max-h-60 overflow-y-auto">
                                <ul className="divide-y divide-gray-100">
                                    {parsedGroups.map((g, i) => (
                                    <li key={i} className="px-4 py-2 text-sm text-gray-600 bg-white">
                                        <div className="font-bold text-gray-800">• {g.title}</div>
                                        {g.items && g.items.length > 0 && (
                                        <div className="pl-4 mt-1 text-xs text-gray-500 space-y-1">
                                            {g.items.map((item, j) => (
                                            <div key={j} className="flex justify-between border-b border-gray-50 pb-1 last:border-0">
                                                <span className="truncate pr-2">- {item.description}</span>
                                                <span>{item.price ? item.price.toLocaleString() : 0} บ.</span>
                                            </div>
                                            ))}
                                        </div>
                                        )}
                                    </li>
                                    ))}
                                </ul>
                                </div>
                            </div>
                            )}
                        </div>
                        )}
                    </div>
                    
                    <div className="p-4 border-t border-gray-100 bg-white flex gap-3 shrink-0">
                        <button onClick={() => setIsGroupModalOpen(false)} className="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">ยกเลิก</button>
                        {groupCreateMode === 'manual' ? (
                        <button type="submit" form="group-form" className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">บันทึก</button>
                        ) : (
                        <button onClick={handleExcelGroupSubmit} disabled={!parsedGroups} className={`flex-1 px-4 py-2 rounded-lg font-bold transition-all shadow-sm ${parsedGroups ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                            นำเข้า {parsedGroups?.length || 0} หัวข้อหลัก
                        </button>
                        )}
                    </div>
                    </div>
                </div>
                );
            };

            const SubItemModal = () => {
                if (!isSubItemModalOpen) return null;
                return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-50 px-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-4xl overflow-hidden animate-in fade-in zoom-in-95 duration-200 flex flex-col max-h-[90vh]">
                    <div className="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50 shrink-0">
                        <h3 className="text-lg font-bold text-gray-800">{editingSubItem ? 'แก้ไขรายการย่อยและครุภัณฑ์' : 'เพิ่มรายการย่อย'}</h3>
                        <button onClick={closeSubItemModal} className="text-gray-400 hover:text-gray-600"><X className="w-5 h-5" /></button>
                    </div>

                    {!editingSubItem && (
                        <div className="flex border-b border-gray-200 shrink-0">
                        <button onClick={() => setSubItemCreateMode('manual')} className={`flex-1 py-3 text-sm font-medium border-b-2 transition-colors ${subItemCreateMode === 'manual' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>กรอกข้อมูลเอง</button>
                        <button onClick={() => setSubItemCreateMode('excel')} className={`flex-1 py-3 text-sm font-medium border-b-2 flex items-center justify-center gap-2 ${subItemCreateMode === 'excel' ? 'border-green-600 text-green-600' : 'border-transparent text-gray-500'}`}><FileSpreadsheet className="w-4 h-4" /> อัปโหลดไฟล์ Excel</button>
                        </div>
                    )}

                    <div className="overflow-y-auto p-6 bg-gray-50">
                        {subItemCreateMode === 'manual' ? (
                        <form id="manual-subitem-form" onSubmit={handleSaveSubItem} className="space-y-6">
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                            <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-blue-500"></div>
                            <h4 className="font-bold text-slate-800 flex items-center gap-2 mb-4"><Package className="w-5 h-5 text-blue-600"/> รายการครุภัณฑ์</h4>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                <div className="md:col-span-2">
                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">ชื่อรายการครุภัณฑ์</label>
                                <input type="text" required className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="ระบุรายละเอียด..." value={subItemFormData.description} onChange={(e) => setSubItemFormData({...subItemFormData, description: e.target.value})} />
                                </div>
                                <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1.5">จำนวนเงินรวม (บาท)</label>
                                <input type="number" required className="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 text-right font-mono" placeholder="0.00" value={subItemFormData.price} onChange={(e) => setSubItemFormData({...subItemFormData, price: e.target.value})} />
                                </div>
                            </div>
                            </div>

                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                            <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-emerald-500"></div>
                            <div className="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
                                <h4 className="font-bold text-slate-800 flex items-center gap-2"><FileText className="w-5 h-5 text-emerald-600"/> รายละเอียดรายการครุภัณฑ์ <span className="bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-full text-xs font-bold">{subItemFormData.assets?.length || 0} รายการ</span></h4>
                                <button type="button" onClick={handleAddAssetToForm} className="text-sm bg-emerald-50 text-emerald-700 hover:bg-emerald-100 px-4 py-2 rounded-lg flex items-center gap-1.5 font-bold transition-colors border border-emerald-100"><PlusCircle className="w-4 h-4" /> แอดรายการครุภัณฑ์</button>
                            </div>
                            <div className="space-y-4">
                                {subItemFormData.assets.map((asset, index) => (
                                <div key={asset.id} className="p-5 border border-slate-200 rounded-xl bg-white relative">
                                    <div className="absolute -left-3 -top-3 bg-slate-800 text-white w-8 h-8 flex items-center justify-center rounded-lg font-bold text-sm">{index + 1}</div>
                                    <button type="button" onClick={() => handleRemoveAssetFromForm(asset.id)} className="absolute top-4 right-4 text-slate-300 hover:text-red-500"><Trash2 className="w-5 h-5" /></button>
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 pl-2 pr-8">
                                    <div className="lg:col-span-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1.5">หมายเลขครุภัณฑ์</label>
                                        <input type="text" className="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-md font-mono" placeholder="เลขครุภัณฑ์..." value={asset.assetNumber} onChange={(e) => handleUpdateAssetInForm(asset.id, 'assetNumber', e.target.value)} />
                                        </div>
                                        <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1.5">รายการ / รายละเอียด</label>
                                        <input type="text" className="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-md" placeholder="รายละเอียด..." value={asset.assetName} onChange={(e) => handleUpdateAssetInForm(asset.id, 'assetName', e.target.value)} />
                                        </div>
                                    </div>
                                    <div className="lg:col-span-3">
                                        <label className="block text-xs font-bold text-slate-500 mb-1.5">สถานะการจัดซื้อ</label>

                                        <option value="pending">อยู่ระหว่างจัดซื้อ</option>
                                        <option value="purchased">จัดซื้อแล้ว</option>

                                    </div>
                                    <div className="lg:col-span-3 flex flex-col justify-end">
                                        <label className="block text-xs font-bold text-slate-500 mb-1.5">ภาพประกอบ</label>
                                        <div className="flex items-center gap-3">
                                        {asset.image && <div className="w-10 h-10 rounded border border-slate-200 overflow-hidden"><img src={asset.image} className="w-full h-full object-cover" /></div>}

                                            <Camera className="w-4 h-4" /> {asset.image ? 'เปลี่ยนภาพ' : 'แนบภาพ'}
                                            <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUploadInForm(asset.id, e)} />
                                        </label>
                                        </div>
                                    </div>
                                    </div>
                                </div>
                                ))}
                            </div>
                            </div>

                            {subItemFormData.assets?.length === 0 && (
                            <div className="bg-slate-50 p-5 rounded-xl border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                                <div><h4 className="font-bold text-slate-800 text-sm">สถานะของรายการย่อย</h4></div>
                                <div className="w-full sm:w-64">
                                <select className={`w-full px-4 py-2.5 border rounded-lg font-bold text-sm ${subItemFormData.itemStatus === 'purchased' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`} value={subItemFormData.itemStatus} onChange={(e) => setSubItemFormData({...subItemFormData, itemStatus: e.target.value})}>
                                    <option value="pending">อยู่ระหว่างจัดซื้อ</option>
                                    <option value="purchased">จัดซื้อแล้ว</option>
                                </select>
                                </div>
                            </div>
                            )}
                        </form>
                        ) : (
                        <div className="space-y-6">
                            {!parsedSubItems ? (
                            <div className="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center bg-white relative">
                                <input type="file" accept=".xlsx, .xls, .csv" onChange={handleSubItemFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                {isSubItemParsing ? (
                                <div className="flex flex-col items-center text-blue-600"><Loader2 className="w-10 h-10 animate-spin mb-3" /><p className="font-medium">กำลังอ่านข้อมูล...</p></div>
                                ) : (
                                <div className="flex flex-col items-center text-gray-500">
                                    <UploadCloud className="w-12 h-12 text-gray-400 mb-3" />
                                    <p className="font-medium text-gray-700">คลิกเพื่ออัปโหลดไฟล์ Excel</p>
                                    <p className="text-xs text-blue-500 mt-2 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">รูปแบบ: คอลัมน์ A (เลขครุภัณฑ์), B (รายการ), C (ราคา)</p>
                                </div>
                                )}
                            </div>
                            ) : (
                            <div className="space-y-4 animate-in fade-in">
                                <div className="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-start gap-3">
                                <FileSpreadsheet className="w-5 h-5 mt-0.5" />
                                <div className="flex-1">
                                    <p className="font-medium">พบ {parsedSubItems.length} รายการย่อย</p>
                                    <p className="text-sm opacity-80">คลิกปุ่มนำเข้าด้านล่างเพื่อเริ่มสร้างรายการย่อย</p>
                                </div>
                                <button onClick={() => { setParsedSubItems(null); setSubItemFile(null); }} className="text-sm text-green-700 underline font-medium">เปลี่ยนไฟล์</button>
                                </div>
                                <div className="border border-gray-200 rounded-lg overflow-hidden max-h-60 overflow-y-auto">
                                <ul className="divide-y divide-gray-100">
                                    {parsedSubItems.map((item, i) => (
                                    <li key={i} className="px-4 py-2 text-sm text-gray-600 bg-white flex justify-between">
                                        <span className="truncate flex-1 pr-2">• {item.assetNumberRaw ? `[${item.assetNumberRaw}] ` : ''}{item.description}</span>
                                        <span className="font-mono text-gray-900 font-bold">{item.price.toLocaleString()} บ.</span>
                                    </li>
                                    ))}
                                </ul>
                                </div>
                            </div>
                            )}
                        </div>
                        )}
                    </div>
                    
                    <div className="p-4 border-t border-gray-100 bg-white flex gap-3 shrink-0">
                        <button onClick={closeSubItemModal} className="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">ยกเลิก</button>
                        {subItemCreateMode === 'manual' ? (
                        <button type="submit" form="manual-subitem-form" className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">บันทึกข้อมูล</button>
                        ) : (
                        <button onClick={handleExcelSubItemSubmit} disabled={!parsedSubItems} className={`flex-1 px-4 py-2 rounded-lg font-bold transition-all shadow-sm ${parsedSubItems ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                            นำเข้า {parsedSubItems?.length || 0} รายการ
                        </button>
                        )}
                    </div>
                    </div>
                </div>
                );
            };

                if (!assetImagePreview.isOpen) return null;
                return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center bg-black bg-opacity-75 px-4 backdrop-blur-sm" onClick={() => setAssetImagePreview({ isOpen: false, imageUrl: null, title: '' })}>

                    <div className="flex justify-between items-center p-4 border-b border-gray-100">
                        <h3 className="text-lg font-bold text-gray-800">{assetImagePreview.title}</h3>
                        <button onClick={() => setAssetImagePreview({ isOpen: false, imageUrl: null, title: '' })} className="text-gray-400 hover:text-gray-600"><X className="w-5 h-5" /></button>
                    </div>
                    <div className="p-4 bg-gray-100 flex justify-center items-center min-h-[300px]"><img src={assetImagePreview.imageUrl} className="max-w-full max-h-[70vh] object-contain rounded shadow-sm" /></div>
                    </div>
                </div>
                );
            };

            const DeleteConfirmModal = () => {
                if (!deleteConfirm.isOpen) return null;
                return (
                <div className="fixed inset-0 z-[70] flex items-center justify-center bg-black bg-opacity-50 px-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 animate-in zoom-in-95">
                    <h3 className="text-lg font-bold text-gray-800 mb-2">ยืนยันการลบ</h3>
                    <p className="text-gray-600 text-sm mb-6">คุณต้องการลบข้อมูลนี้ใช่หรือไม่?</p>
                    <div className="flex gap-3">
                        <button onClick={() => setDeleteConfirm({ isOpen: false })} className="flex-1 px-4 py-2 border border-gray-300 rounded-lg">ยกเลิก</button>
                        <button onClick={executeDelete} className="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">ลบข้อมูล</button>
                    </div>
                    </div>
                </div>
                );
            };

            const CreateDocumentModal = () => {
                if (!isCreateModalOpen) return null;
                return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 px-4">
