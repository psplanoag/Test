                    <div className="flex justify-between items-center p-4 border-b bg-gray-50"><h3 className="text-lg font-bold text-gray-800">สร้างใบโอนจัดสรรใหม่</h3><button onClick={closeCreateModal} className="text-gray-400"><X className="w-5 h-5" /></button></div>
                    <div className="flex border-b">
                        <button onClick={() => setCreateMode('manual')} className={`flex-1 py-3 text-sm font-medium border-b-2 ${createMode === 'manual' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>กรอกข้อมูลเอง</button>
                        <button onClick={() => setCreateMode('excel')} className={`flex-1 py-3 text-sm font-medium border-b-2 ${createMode === 'excel' ? 'border-green-600 text-green-600' : 'border-transparent text-gray-500'}`}>อัปโหลดไฟล์ Excel</button>
                    </div>
                    <div className="p-6">
                        {createMode === 'manual' ? (
                        <form id="manual-form" onSubmit={handleCreateSubmit} className="space-y-4">
                            <div><label className="block text-sm font-medium text-gray-700">หมายเลขใบโอน</label><input type="text" required className="w-full px-3 py-2 border rounded-lg" value={formData.id} onChange={(e) => setFormData({...formData, id: e.target.value})} /></div>
                            <div><label className="block text-sm font-medium text-gray-700">วันที่โอน</label><input type="date" required className="w-full px-3 py-2 border rounded-lg" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} /></div>
                            <div><label className="block text-sm font-medium text-gray-700">ปลายทาง</label><input type="text" required className="w-full px-3 py-2 border rounded-lg" value={formData.destination} onChange={(e) => setFormData({...formData, destination: e.target.value})} /></div>
                        </form>
                        ) : (
                        <div className="space-y-4">
                            {!parsedData ? (
                            <div className="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center bg-white relative">
                                <input type="file" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                {isParsing ? (
                                <div className="flex flex-col items-center text-blue-600"><Loader2 className="w-10 h-10 animate-spin mb-3" /><p className="font-medium">กำลังอ่านข้อมูล...</p></div>
                                ) : (
                                <div className="flex flex-col items-center text-gray-500">
                                    <UploadCloud className="w-12 h-12 text-gray-400 mb-3" />
                                    <p className="font-medium text-gray-700">คลิกเพื่ออัปโหลดไฟล์ Excel</p>
                                </div>
                                )}
                            </div>
                            ) : (
                            <div className="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-start gap-3">
                                <FileSpreadsheet className="w-5 h-5 mt-0.5" />
                                <div className="flex-1">
                                <p className="font-medium">พร้อมนำเข้าข้อมูลใบโอน</p>
                                <p className="text-sm opacity-80">พบ {parsedData.groups?.length || 0} หัวข้อหลัก, {parsedData.groups?.reduce((acc, g) => acc + g.items.length, 0) || 0} รายการย่อย</p>
                                </div>
                                <button type="button" onClick={() => { setParsedData(null); setSelectedFile(null); }} className="text-sm text-green-700 underline font-medium">เปลี่ยนไฟล์</button>
                            </div>
                            )}
                        </div>
                        )}
                    </div>
                    <div className="p-4 border-t flex gap-3">
                        <button onClick={closeCreateModal} className="flex-1 px-4 py-2 border rounded-lg hover:bg-gray-50 transition-colors">ยกเลิก</button>
                        {createMode === 'manual' ? (
                        <button type="submit" form="manual-form" className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">สร้างใบโอน</button>
                        ) : (
                        <button onClick={handleExcelSubmit} disabled={!parsedData} className={`flex-1 px-4 py-2 rounded-lg font-bold transition-all shadow-sm ${parsedData ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                            นำเข้าข้อมูล Excel
                        </button>
                        )}
                    </div>
                    </div>
                </div>
                );
            };

            const DocumentListView = () => {
                return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2"><FileText className="text-blue-600" />รายการใบโอนจัดสรร</h2>
                    <button onClick={() => setIsCreateModalOpen(true)} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2"><Plus className="w-4 h-4" /> สร้างใบโอนใหม่</button>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-4 border-b border-gray-100"><div className="relative w-full sm:w-72"><Search className="absolute left-3 top-2.5 h-4 w-4 text-gray-400" /><input type="text" className="w-full pl-10 pr-3 py-2 border rounded-lg text-sm" placeholder="ค้นหา..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div></div>
                    <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-gray-200">
                        <thead className="bg-gray-50">
                            <tr><th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">หมายเลขใบโอน</th><th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">วันที่โอน</th><th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">ปลายทาง</th><th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">สถานะ</th><th className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">จัดการ</th></tr>
                        </thead>
                        <tbody className="bg-white divide-y divide-gray-200">
                            {filteredDocs.map((doc) => (
                            <tr key={doc.id} className="hover:bg-gray-50">
                                <td className="px-6 py-4 text-center text-sm font-medium text-blue-600">{doc.id}</td>
                                <td className="px-6 py-4 text-center text-sm text-gray-500">{new Date(doc.date).toLocaleDateString('th-TH')}</td>
                                <td className="px-6 py-4 text-center text-sm text-gray-900">{doc.destination}</td>
                                <td className="px-6 py-4 text-center"><StatusBadge status={doc.status} /></td>
                                <td className="px-6 py-4 text-center"><button onClick={() => handleViewDocument(doc.id)} className="text-blue-600 hover:text-blue-900 bg-blue-50 px-3 py-1.5 rounded-md text-sm mx-auto flex items-center gap-1"><Eye className="w-4 h-4" /> ดูรายละเอียด</button></td>
                            </tr>
                            ))}
                        </tbody>
                        </table>
                    </div>
                    </div>
                    {CreateDocumentModal()}
                </div>
                );
            };

            const DocumentDetailView = () => {
                if (!selectedDocument) return null;

                let totalItemsCount = 0;
                let purchasedItemsCount = 0;
                let grandTotal = 0;
                let purchasedTotal = 0;

                relatedGroups.flatMap(g => g.items).forEach(item => {
                const itemPrice = Number(item.price) || 0;
                grandTotal += itemPrice;
                if (item.assets && item.assets.length > 0) {
                    totalItemsCount += item.assets.length;
                    const purchasedAssets = item.assets.filter(a => a.status === 'purchased').length;
                    purchasedItemsCount += purchasedAssets;
                    purchasedTotal += (itemPrice / item.assets.length) * purchasedAssets;
                } else {
                    totalItemsCount += 1;
                    if (item.itemStatus === 'purchased') { purchasedItemsCount += 1; purchasedTotal += itemPrice; }
                }
                });

                const itemsPercent = totalItemsCount === 0 ? 0 : Math.round((purchasedItemsCount / totalItemsCount) * 100);
                const moneyPercent = grandTotal === 0 ? 0 : Math.round((purchasedTotal / grandTotal) * 100);

                const allGroupIds = relatedGroups.map(g => g.id);
                const isAllExpanded = allGroupIds.length > 0 && expandedGroups.length === allGroupIds.length;
                const toggleExpandAll = () => isAllExpanded ? (setExpandedGroups([]), setExpandedSubItems([])) : setExpandedGroups(allGroupIds);

                return (
                <div className="space-y-6 animate-in fade-in duration-300">
                    <div className="flex items-center gap-4">
                    <button onClick={handleBackToList} className="p-2 hover:bg-gray-100 rounded-full transition-colors"><ArrowLeft className="w-5 h-5" /></button>
                    <h2 className="text-xl font-bold text-gray-800">รายละเอียดใบโอนจัดสรร</h2>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-6 md:p-8">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-100 pb-4 mb-4 gap-4">
                        <div><p className="text-sm text-gray-500 mb-1">หมายเลขใบโอน</p><h3 className="text-2xl font-bold text-blue-700">{selectedDocument.id}</h3></div>
                        <div className="w-full md:w-auto text-left md:text-right">
                            <p className="text-sm text-gray-500 mb-1">สถานะเอกสาร</p>
                            <select value={selectedDocument.status} onChange={(e) => handleStatusChange(selectedDocument.id, e.target.value)} className={`block w-full md:w-48 text-sm rounded-md border p-2 font-bold outline-none cursor-pointer ${selectedDocument.status === 'completed' ? 'bg-green-100 text-green-800 border-green-200' : selectedDocument.status === 'pending' ? 'bg-blue-100 text-blue-800 border-blue-200' : 'bg-red-100 text-red-800 border-red-200'}`}>
                            <option value="completed" className="bg-white text-gray-900">โอนจัดสรรแล้ว</option>
                            <option value="pending" className="bg-white text-gray-900">อยู่ระหว่างดำเนินการ</option>
                            <option value="untransferred" className="bg-white text-gray-900">ยังไม่โอนจัดสรร</option>
                            </select>
                        </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="flex items-start gap-3"><Calendar className="w-5 h-5 text-gray-400 mt-0.5" /><div><p className="text-sm font-medium text-gray-500">วันที่ทำรายการ</p><p className="text-gray-900">{new Date(selectedDocument.date).toLocaleDateString('th-TH')}</p></div></div>
                        <div className="flex items-start gap-3"><MapPin className="w-5 h-5 text-blue-500 mt-0.5" /><div><p className="text-sm font-medium text-blue-600">หน่วยงานปลายทาง (ผู้รับ)</p><p className="text-gray-900 font-medium">{selectedDocument.destination}</p></div></div>
                        </div>
                    </div>
                    <div className="p-6 md:p-8 border-t border-gray-100 bg-gray-50/30">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 divide-y md:divide-y-0 md:divide-x divide-gray-100">
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-6 p-2">
                            <SemiCircleGauge percent={itemsPercent} color="#10b981" />
                            <div className="flex flex-col space-y-3"><h4 className="text-gray-600 font-bold text-sm">ความคืบหน้าการจัดซื้อ</h4><p className={`text-xl font-bold ${itemsPercent === 100 ? 'text-green-600' : 'text-blue-600'}`}>{itemsPercent === 100 ? 'ดำเนินการแล้วเสร็จ' : 'กำลังดำเนินการ'}</p><div className="flex items-center gap-2 text-sm text-gray-600 font-medium"><span className="w-2.5 h-2.5 rounded-full bg-green-500"></span>ผลสำเร็จ: {purchasedItemsCount} / {totalItemsCount} รายการ</div></div>
                        </div>
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-6 p-2 md:pl-8">
                            <SemiCircleGauge percent={moneyPercent} color="#3b82f6" />
                            <div className="flex flex-col space-y-3 w-full max-w-[200px]"><h4 className="text-gray-600 font-bold text-sm">งบประมาณ</h4><p className="text-xl font-bold text-gray-900">{grandTotal.toLocaleString()} บ.</p><div className="text-sm text-gray-600 space-y-1"><div className="flex items-center gap-2"><span className="w-2.5 h-2.5 rounded-full bg-blue-500"></span>ใช้ไป: {purchasedTotal.toLocaleString()} บ.</div><div className="flex items-center gap-2"><span className="w-2.5 h-2.5 rounded-full bg-gray-300"></span>เหลือ: {(grandTotal - purchasedTotal).toLocaleString()} บ.</div></div></div>
                        </div>
                        </div>
                    </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-4 bg-gray-50 border-b flex justify-between items-center gap-4">
                        <div><h3 className="text-lg font-bold text-gray-800 flex items-center gap-2"><Package className="w-5 h-5" /> รายการครุภัณฑ์ที่โอนจัดสรร</h3><p className="text-sm text-gray-500">ยอดรวม: <span className="font-bold text-green-600">{grandTotal.toLocaleString()} บาท</span></p></div>
                        <div className="flex gap-2"><button onClick={toggleExpandAll} className="bg-white border px-3 py-2 rounded-lg flex items-center gap-1.5 text-sm font-medium transition-colors hover:bg-gray-50">{isAllExpanded ? <><ChevronsUp className="w-4 h-4" /> ย่อทั้งหมด</> : <><ChevronsDown className="w-4 h-4" /> ขยายทั้งหมด</>}</button><button onClick={handleOpenAddGroup} className="bg-blue-600 text-white px-3 py-2 rounded-lg flex items-center gap-1.5 text-sm font-medium hover:bg-blue-700 transition-colors"><Plus className="w-4 h-4" /> เพิ่มหัวข้อหลัก</button></div>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-gray-200">
                        <thead className="bg-gray-100">
                            <tr><th className="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-16">ลำดับ</th><th className="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-32">จำนวน</th><th className="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase">รายการ</th><th className="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-32">จำนวนเงิน</th><th className="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-40">สถานะ</th><th className="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-24">จัดการ</th></tr>
                        </thead>
                        <tbody className="bg-white divide-y divide-gray-200">
                            {relatedGroups.map((group, gIndex) => {
                            const isExpanded = expandedGroups.includes(group.id);
                            const groupTotal = group.items.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
                            const isAllPurchased = group.items.length > 0 && group.items.every(item => item.assets?.length > 0 ? item.assets.every(a => a.status === 'purchased') : item.itemStatus === 'purchased');
                            return (
                                <Fragment key={group.id}>
                                <tr className={`hover:bg-slate-200 cursor-pointer transition-colors border-b border-gray-200 ${isExpanded ? 'bg-slate-100 shadow-inner' : 'bg-slate-50'}`} onClick={() => toggleGroupExpand(group.id)}>
                                    <td className="px-4 py-4 text-sm font-extrabold text-slate-900"><div className="flex items-center gap-2 mx-auto justify-center">{isExpanded ? <ChevronDown className="w-4 h-4" /> : <ChevronRight className="w-4 h-4" />}{gIndex + 1}</div></td>
                                    <td className="px-4 py-4 text-center"></td>
                                    <td className="px-4 py-4 text-sm font-extrabold text-slate-900 whitespace-pre-wrap">{group.title}</td>
                                    <td className="px-4 py-4 text-sm font-extrabold text-slate-800 text-right">{groupTotal > 0 ? groupTotal.toLocaleString() : '-'}</td>
                                    <td className="px-4 py-4 text-center"><span className={`inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-full border ${isAllPurchased ? 'bg-green-100 text-green-800 border-green-300' : 'bg-yellow-100 text-yellow-800 border-yellow-300'}`}>{isAllPurchased ? 'จัดซื้อครบแล้ว' : 'อยู่ระหว่างจัดซื้อ'}</span></td>
                                    <td className="px-4 py-4 text-center relative"><button onClick={(e) => { e.stopPropagation(); setActiveMenu(activeMenu === group.id ? null : group.id); }} className="p-1.5 rounded-full hover:bg-slate-300 transition-colors"><MoreVertical className="w-5 h-5" /></button>
                                    {activeMenu === group.id && (
                                        <Fragment>
                                        <div className="fixed inset-0 z-40" onClick={(e) => { e.stopPropagation(); setActiveMenu(null); }}></div>
                                        <div className="absolute right-8 top-8 w-48 bg-white rounded-lg shadow-lg border z-50 py-1 text-left">
                                            <button onClick={(e) => handleOpenAddSubItem(group.id, e)} className="w-full px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2"><PlusCircle className="w-4 h-4 text-green-600" /> เพิ่มรายการย่อย</button>
                                            <button onClick={(e) => handleOpenEditGroup(group, e)} className="w-full px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2"><Edit className="w-4 h-4 text-blue-600" /> แก้ไขหัวข้อหลัก</button>
                                            <div className="border-t my-1"></div>
                                            <button onClick={(e) => handleDeleteGroup(group.id, e)} className="w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2"><Trash2 className="w-4 h-4" /> ลบหัวข้อหลัก</button>
                                        </div>
                                        </Fragment>
                                    )}
                                    </td>
                                </tr>
                                {isExpanded && group.items.map((item) => {
                                    const isSubItemExpanded = expandedSubItems.includes(item.id);
                                    const hasAssets = item.assets && item.assets.length > 0;
                                    const pCount = hasAssets ? item.assets.filter(a => a.status === 'purchased').length : 0;
                                    return (
                                    <Fragment key={item.id}>
                                        <tr className="bg-white hover:bg-gray-50 transition-colors border-b cursor-pointer" onClick={() => hasAssets && toggleSubItemExpand(item.id)}>
                                        <td className="px-4 py-3"></td>
                                        <td className="px-4 py-3 text-center">{hasAssets ? <button className="flex items-center justify-center gap-1 mx-auto bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold shadow-sm border border-blue-100">{isSubItemExpanded ? <ChevronDown className="w-3 h-3"/> : <ChevronRight className="w-3 h-3"/>}{item.assets.length} รายการ</button> : <span className="text-gray-400 text-sm">-</span>}</td>
                                        <td className="px-4 py-3 text-sm text-gray-700" style={{ paddingLeft: 'calc(1rem + 1.2cm)' }}>-{item.description}</td>
                                        <td className="px-4 py-3 text-sm text-gray-700 text-right font-mono">{Number(item.price).toLocaleString()}</td>
                                        <td className="px-4 py-3 text-center">
                                            {hasAssets ? <span className={`inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-full border ${pCount === item.assets.length ? 'bg-green-50 text-green-700 border-green-200' : pCount > 0 ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>{pCount === item.assets.length ? 'จัดซื้อครบแล้ว' : pCount > 0 ? `จัดซื้อแล้ว ${pCount}/${item.assets.length}` : 'อยู่ระหว่างจัดซื้อ'}</span> : <span className={`inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-full border ${item.itemStatus === 'purchased' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>{item.itemStatus === 'purchased' ? 'จัดซื้อแล้ว' : 'อยู่ระหว่างจัดซื้อ'}</span>}
                                        </td>
                                        <td className="px-4 py-3 text-center relative">
                                            <button onClick={(e) => { e.stopPropagation(); setActiveMenu(activeMenu === item.id ? null : item.id); }} className="text-gray-400 hover:bg-gray-200 p-1.5 rounded-full transition-colors"><MoreVertical className="w-4 h-4" /></button>
                                            {activeMenu === item.id && (
                                            <Fragment>
                                                <div className="fixed inset-0 z-40" onClick={(e) => { e.stopPropagation(); setActiveMenu(null); }}></div>
                                                <div className="absolute right-8 top-8 w-44 bg-white rounded-lg shadow-lg border z-50 py-1 text-left">
                                                <button onClick={(e) => handleOpenEditSubItem(group.id, item, e)} className="w-full px-4 py-2 text-sm hover:bg-gray-50 flex items-center gap-2"><Edit className="w-4 h-4 text-blue-600" /> แก้ไข / แอดครุภัณฑ์</button>
                                                <button onClick={(e) => handleDeleteSubItem(group.id, item.id, e)} className="w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2"><Trash2 className="w-4 h-4" /> ลบ</button>
                                                </div>
                                            </Fragment>
                                            )}
                                        </td>
                                        </tr>
                                        {isSubItemExpanded && hasAssets && (
                                        <tr className="bg-slate-100/60">
                                            <td colSpan="6" className="px-4 md:px-8 py-6 border-b shadow-inner">
                                            <div className="max-w-5xl mx-auto">
                                                <div className="flex items-center gap-2 mb-4 px-2"><Package className="w-4 h-4 text-blue-600" /><h4 className="font-bold text-slate-700">รายการครุภัณฑ์ ({item.assets.length} ชิ้น)</h4></div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {item.assets.map((asset, aIndex) => (
                                                    <div key={asset.id} className="bg-white border rounded-xl p-4 flex gap-4 hover:border-blue-300 hover:shadow-md transition-all relative overflow-hidden group">
                                                    <div className={`absolute left-0 top-0 bottom-0 w-1 ${asset.status === 'purchased' ? 'bg-green-500' : 'bg-yellow-400'}`}></div>
                                                    <div className={`w-20 h-20 rounded-lg flex-shrink-0 flex items-center justify-center border ${asset.image ? 'cursor-pointer overflow-hidden' : 'bg-slate-50 border-dashed border-slate-300 text-slate-300'}`} onClick={() => asset.image && setAssetImagePreview({ isOpen: true, imageUrl: asset.image, title: `ภาพประกอบ: ${asset.assetName || asset.assetNumber}` })}>
                                                        {asset.image ? <div className="w-full h-full relative"><img src={asset.image} className="w-full h-full object-cover transition-transform group-hover:scale-110" /><div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity"><Eye className="w-5 h-5 text-white" /></div></div> : <ImageIcon className="w-6 h-6" />}
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex justify-between items-start mb-1">
                                                        <span className="text-[10px] font-bold text-black uppercase tracking-wider bg-slate-100 px-1.5 py-0.5 rounded">ชิ้นที่ {aIndex + 1}</span>
                                                        <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${asset.status === 'purchased' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>{asset.status === 'purchased' ? 'จัดซื้อแล้ว' : 'รอจัดซื้อ'}</span>
                                                        </div>
                                                        <h5 className="font-mono text-sm font-bold text-blue-700 truncate">{asset.assetNumber || 'ไม่มีเลข'}</h5>
                                                        <p className="text-xs text-slate-500 truncate mt-0.5">{asset.assetName || '-'}</p>
                                                    </div>
                                                    </div>
                                                ))}
                                                </div>
                                            </div>
                                            </td>
                                        </tr>
                                        )}
                                    </Fragment>
                                    );
                                })}
                                {isExpanded && group.items.length === 0 && (
                                    <tr className="bg-white"><td colSpan="6" className="px-4 py-8 text-center text-gray-400 italic font-medium">ยังไม่มีรายการย่อย คลิก <button onClick={(e) => handleOpenAddSubItem(group.id, e)} className="text-blue-600 hover:underline">เพิ่มรายการย่อย</button></td></tr>
                                )}
                                </Fragment>
                            );
                            })}
                            {relatedGroups.length === 0 && (
                            <tr>
                                <td colSpan="6" className="px-6 py-20 text-center">
                                <div className="flex flex-col items-center justify-center text-slate-500">
                                    <div className="bg-slate-100 p-5 rounded-full mb-4 shadow-inner">
                                    <Package className="w-12 h-12 text-slate-400" />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-700 mb-2">ยังไม่มีหัวข้อหลักในใบโอนนี้</h3>
                                    <p className="text-sm mb-6 max-w-md text-slate-500 text-center">คุณสามารถลบหัวข้อทั้งหมดได้ และสามารถเริ่มต้นการจัดสรรใหม่โดยการกดเพิ่มหัวข้อหลัก เพื่อใส่รายการครุภัณฑ์</p>
                                    <button onClick={handleOpenAddGroup} className="bg-blue-600 text-white px-6 py-3 rounded-xl flex items-center gap-2 font-bold transition-all shadow hover:bg-blue-700 transform hover:-translate-y-0.5"><Plus className="w-5 h-5"/> เพิ่มหัวข้อหลักเดี๋ยวนี้</button>
                                </div>
                                </td>
                            </tr>
                            )}
                        </tbody>
                        </table>
                    </div>
                    </div>

                    <div className="flex flex-col sm:flex-row justify-end gap-3 pt-4 pb-2">
                    <label className="cursor-pointer bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-6 py-2.5 rounded-lg flex items-center justify-center gap-2 text-sm font-bold transition-colors shadow-sm">
                        <Paperclip className="w-4 h-4 text-gray-500" /><span className="truncate max-w-[200px]">{selectedDocument.attachedFile ? selectedDocument.attachedFile : 'แนบใบโอนจัดสรร'}</span>
                        <input type="file" className="hidden" onChange={handleAttachFileToDocument} accept=".pdf,.jpg,.jpeg,.png" />
                    </label>
                    <button onClick={handleSaveDocumentDetail} disabled={isSavingDoc} className={`px-6 py-2.5 rounded-lg flex items-center justify-center gap-2 text-sm font-bold transition-all shadow-sm ${saveSuccess ? 'bg-green-600 text-white' : 'bg-blue-600 text-white hover:bg-blue-700'} ${isSavingDoc ? 'opacity-80' : ''}`}>
                        {isSavingDoc ? <Fragment><Loader2 className="w-4 h-4 animate-spin" /> กำลังบันทึก...</Fragment> : saveSuccess ? <Fragment><CheckCircle className="w-4 h-4" /> บันทึกสำเร็จ</Fragment> : <Fragment><Save className="w-4 h-4" /> บันทึกข้อมูล</Fragment>}
                    </button>
                    </div>
                </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans">
                <div className="max-w-6xl mx-auto">
                    {currentView === 'list' && (
                        <header className="mb-8">
                        <h1 className="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">ระบบจัดสรรงบประมาณและครุภัณฑ์</h1>
                        <p className="text-gray-500 mt-1">อ้างอิงฟอร์แมต: เอกสารการโอนเงินงบประมาณ/ค่าครุภัณฑ์</p>
                        </header>
                    )}
                    <main>{currentView === 'list' ? DocumentListView() : DocumentDetailView()}</main>
                    {GroupModal()} {SubItemModal()} {DeleteConfirmModal()} {CreateDocumentModal()} {AssetImagePreviewModal()}
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
