<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดสรรงบประมาณและครุภัณฑ์</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SheetJS (Excel Parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* สไตล์เสริมสำหรับการแสดง Modal Animation */
        .animate-in { animation: fadeIn 0.2s ease-out; }
        .zoom-in-95 { animation: zoomIn 0.2s ease-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Custom scrollbar แบบบาง */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-900">

    <div id="app"></div>

    <script>
        // --- 1. ข้อมูลและ State เริ่มต้น ---
        const INITIAL_DOCUMENTS = [
            { id: 'TR-2567-0001', date: '2024-12-29', destination: 'สอจ.วิเชียรบุรี', status: 'completed', creator: 'เจ้าหน้าที่', notes: 'จัดสรรงบประมาณ 29006630001004100281', attachedFile: null, attachedFileUrl: null, fileType: null },
            { id: 'TR-2567-0002', date: '2024-03-05', destination: 'สาขาเชียงใหม่', status: 'pending', creator: 'สมชาย ใจดี', notes: 'ส่งคอมพิวเตอร์ทดแทนเครื่องที่ชำรุด', attachedFile: null, attachedFileUrl: null, fileType: null }
        ];

        const INITIAL_EQUIPMENT_GROUPS = [
            { id: 'g-1', docId: 'TR-2567-0001', title: 'รายการ ชุดโต๊ะทำงาน เก้าอี้ทำงาน และเก้าอี้หน้าโต๊ะ ระดับชำนาญการ ระดับชำนาญงาน ระดับปฏิบัติการและระดับปฏิบัติงาน', items: [
                { id: 'i-1-1', assetNumber: 'OF-67-001', description: 'ชุดโต๊ะทำงาน และเก้าอี้ทำงานระดับปฏิบัติการ จำนวน 1 ชุด', price: 12300, itemStatus: 'purchased' },
                { id: 'i-1-2', assetNumber: 'OF-67-002 ถึง 007', description: 'เก้าอี้หน้าโต๊ะระดับชำนาญการ (CH-12) จำนวน 6 ตัว', price: 7800, itemStatus: 'purchased' },
                { id: 'i-1-3', assetNumber: '', description: 'เก้าอี้หน้าโต๊ะระดับชำนาญงาน (CH-12) จำนวน 4 ตัว', price: 5200, itemStatus: 'pending' },
                { id: 'i-1-4', assetNumber: '', description: 'เก้าอี้หน้าโต๊ะระดับปฏิบัติการ (CH-12) จำนวน 2 ตัว', price: 2600, itemStatus: 'pending' },
                { id: 'i-1-5', assetNumber: '', description: 'ชุดโต๊ะทำงาน และเก้าอี้ทำงานระดับชำนาญการ จำนวน 1 ชุด', price: 12300, itemStatus: 'pending' },
                { id: 'i-1-6', assetNumber: '', description: 'ชุดโต๊ะทำงาน และเก้าอี้ทำงานระดับชำนาญงาน จำนวน 2 ชุด', price: 24600, itemStatus: 'pending' },
                { id: 'i-1-7', assetNumber: '', description: 'เก้าอี้ทำงานระดับปฏิบัติการ (CH-5) จำนวน 1 ตัว', price: 3900, itemStatus: 'pending' },
                { id: 'i-1-8', assetNumber: '', description: 'ชุดโต๊ะทำงาน เก้าอี้ทำงาน และเก้าอี้หน้าโต๊ะระดับปฏิบัติงาน จำนวน 1 ชุด', price: 14900, itemStatus: 'pending' }
            ]},
            { id: 'g-2', docId: 'TR-2567-0001', title: 'รายการ เครื่องถ่ายเอกสาร ระบบดิจิทัล (ขาว-ดำ) ความเร็ว 50 แผ่นต่อนาที', items: [
                { id: 'i-2-1', description: 'เครื่องถ่ายเอกสาร ระบบดิจิทัล (ขาว-ดำ) ความเร็ว 50 แผ่นต่อนาที จำนวน 1 เครื่อง', price: 188000, itemStatus: 'pending' }
            ]},
            { id: 'g-3', docId: 'TR-2567-0001', title: 'รายการ ตู้เหล็ก แบบ 2 บาน', items: [
                { id: 'i-3-1', description: 'ตู้เหล็ก แบบ 2 บาน จำนวน 10 ตู้', price: 66000, itemStatus: 'purchased' }
            ]}
        ];

        // State ศูนย์กลาง (คล้ายการใช้ useState ใน React)
        let state = {
            view: 'list', // 'list' | 'detail'
            selectedDocId: null,
            searchTerm: '',
            
            documents: JSON.parse(JSON.stringify(INITIAL_DOCUMENTS)),
            equipmentGroups: JSON.parse(JSON.stringify(INITIAL_EQUIPMENT_GROUPS)),
            expandedGroups: ['g-1', 'g-2', 'g-3'],
            
            activeMenu: null,
            isSavingDoc: false,
            saveSuccess: false,

            // Modal States & Temp Data
            modals: {
                create: false,
                group: false,
                subItem: false,
                delete: false,
                preview: false
            },
            
            createMode: 'manual', // 'manual' | 'excel'
            parsedCreateData: null,
            createFileName: null,

            editingGroup: null, // null = add, object = edit
            
            targetGroupId: null,
            editingSubItem: null,
            subItemCreateMode: 'manual', // 'manual' | 'excel'
            parsedSubItems: null,
            subItemFileName: null,
            isSubItemParsing: false,

            deleteTarget: { type: null, groupId: null, itemId: null },
            previewFile: null
        };

        // ฟังก์ชันช่วยเหลือสำหรับหลีกเลี่ยง XSS และข้อผิดพลาดจากเครื่องหมายคำพูด
        const escapeHTML = (str) => {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        };

        const formatNumber = (num) => Number(num).toLocaleString('th-TH');

        // --- 2. ฟังก์ชันเรนเดอร์ UI ---
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="min-h-screen p-4 md:p-8">
                    <div class="max-w-6xl mx-auto relative">
                        ${state.view === 'list' ? `
                        <header class="mb-8">
                            <h1 class="text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">ระบบจัดสรรงบประมาณและครุภัณฑ์</h1>
                            <p class="text-gray-500 mt-1">อ้างอิงฟอร์แมต: เอกสารการโอนเงินงบประมาณ/ค่าครุภัณฑ์</p>
                        </header>
                        ` : ''}
                        
                        <main>
                            ${state.view === 'list' ? renderListView() : renderDetailView()}
                        </main>
                        
                        <!-- เรนเดอร์ Modals -->
                        ${renderCreateModal()}
                        ${renderGroupModal()}
                        ${renderSubItemModal()}
                        ${renderDeleteConfirmModal()}
                        ${renderFilePreviewModal()}
                    </div>
                </div>
            `;
            // หลังจากอัปเดต DOM ให้วาดไอคอน Lucide ใหม่
            lucide.createIcons();
        }

        // --- View: List View ---
        function renderListView() {
            const lowerSearch = state.searchTerm.toLowerCase();
            const filteredDocs = state.documents.filter(doc => {
                const matchDocFields = doc.id.toLowerCase().includes(lowerSearch) || 
                                       doc.destination.toLowerCase().includes(lowerSearch) ||
                                       (doc.notes && doc.notes.toLowerCase().includes(lowerSearch));
                const docGroups = state.equipmentGroups.filter(g => g.docId === doc.id);
                const matchGroupsOrItems = docGroups.some(group => {
                    if (group.title.toLowerCase().includes(lowerSearch)) return true;
                    return group.items.some(item => 
                        item.description.toLowerCase().includes(lowerSearch) ||
                        (item.assetNumber && item.assetNumber.toLowerCase().includes(lowerSearch))
                    );
                });
                return matchDocFields || matchGroupsOrItems;
            });

            return `
            <div class="space-y-4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100 gap-4">
                    <div>
                        <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2"><i data-lucide="file-text" class="text-blue-600 w-5 h-5"></i>รายการใบโอนจัดสรร</h2>
                    </div>
                    <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
                        <i data-lucide="plus" class="w-4 h-4"></i> สร้างใบโอนใหม่
                    </button>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4 border-b border-gray-100">
                        <div class="relative w-full sm:w-72">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center"><i data-lucide="search" class="h-4 w-4 text-gray-400"></i></div>
                            <input type="text" id="searchInput" onkeyup="handleSearch(event)" value="${escapeHTML(state.searchTerm)}" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="ค้นหา..." />
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">หมายเลขใบโอน</th>
                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">วันที่โอน</th>
                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">ปลายทาง</th>
                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">จำนวนหัวข้อ</th>
                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">สถานะ</th>
                                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                ${filteredDocs.length > 0 ? filteredDocs.map(doc => {
                                    const groupCount = state.equipmentGroups.filter(g => g.docId === doc.id).length;
                                    return `
                                    <tr class="hover:bg-gray-50">
                                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                            ${doc.attachedFile ? `
                                            <button onclick="handleOpenPreview('${doc.id}')" class="text-blue-600 hover:text-blue-800 hover:underline flex items-center gap-1.5 group outline-none" title="คลิกเพื่อดูไฟล์แนบ: ${escapeHTML(doc.attachedFile)}">
                                                ${escapeHTML(doc.id)}
                                                <i data-lucide="paperclip" class="w-3.5 h-3.5 text-gray-400 group-hover:text-blue-600 transition-colors"></i>
                                            </button>
                                            ` : `<span class="text-blue-600">${escapeHTML(doc.id)}</span>`}
                                        </td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">${new Date(doc.date).toLocaleDateString('th-TH')}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 text-center">${escapeHTML(doc.destination)}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">${groupCount} หัวข้อหลัก</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-center">${renderStatusBadge(doc.status)}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-center">
                                            <button onclick="handleViewDocument('${doc.id}')" class="text-blue-600 hover:text-blue-900 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md flex items-center gap-1 mx-auto text-sm transition-colors"><i data-lucide="eye" class="w-4 h-4"></i> ดูรายละเอียด</button>
                                        </td>
                                    </tr>
                                    `;
                                }).join('') : `
                                    <tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">ไม่พบเอกสารที่ค้นหา</td></tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            `;
        }

        // --- View: Detail View ---
        function renderDetailView() {
            const doc = state.documents.find(d => d.id === state.selectedDocId);
            if (!doc) return '';

            const relatedGroups = state.equipmentGroups.filter(g => g.docId === doc.id);
            const allSubItems = relatedGroups.flatMap(g => g.items);
            const totalItemsCount = allSubItems.length;
            const purchasedItemsCount = allSubItems.filter(i => i.itemStatus === 'purchased').length;
            
            const grandTotal = allSubItems.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
            const purchasedTotal = allSubItems.filter(i => i.itemStatus === 'purchased').reduce((sum, item) => sum + (Number(item.price) || 0), 0);

            const itemsPercent = totalItemsCount === 0 ? 0 : Math.round((purchasedItemsCount / totalItemsCount) * 100);
            const moneyPercent = grandTotal === 0 ? 0 : Math.round((purchasedTotal / grandTotal) * 100);

            const allGroupIds = relatedGroups.map(g => g.id);
            const isAllExpanded = allGroupIds.length > 0 && state.expandedGroups.length === allGroupIds.length;

            return `
            <div class="space-y-6 animate-in duration-300">
                
                <!-- ส่วนปุ่มกดด้านบนสุดของหน้า -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div class="flex items-center gap-4">
                        <button onclick="handleBackToList()" class="p-2 hover:bg-gray-200 bg-white rounded-full transition-colors shadow-sm"><i data-lucide="arrow-left" class="w-5 h-5 text-gray-700"></i></button>
                        <h2 class="text-xl font-bold text-gray-800">รายละเอียดใบโอนจัดสรร</h2>
                    </div>
                </div>

                <!-- ข้อมูล Header และ ความคืบหน้า -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    
                    <div class="p-6 md:p-8">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-100 pb-4 mb-4 gap-4">
                            <div>
                                <p class="text-sm text-gray-500 mb-1">หมายเลขใบโอน</p>
                                ${doc.attachedFile ? `
                                <button onclick="handleOpenPreview('${doc.id}')" class="text-2xl font-bold text-blue-700 hover:text-blue-900 flex items-center gap-3 group outline-none transition-colors" title="ดูไฟล์แนบ: ${escapeHTML(doc.attachedFile)}">
                                    <span class="group-hover:underline">${escapeHTML(doc.id)}</span>
                                    <span class="bg-blue-50 border border-blue-100 text-blue-600 text-xs px-2.5 py-1 rounded-full flex items-center gap-1.5 shadow-sm group-hover:bg-blue-100 transition-colors">
                                        <i data-lucide="paperclip" class="w-3.5 h-3.5"></i> มีไฟล์แนบ
                                    </span>
                                </button>
                                ` : `<h3 class="text-2xl font-bold text-blue-700">${escapeHTML(doc.id)}</h3>`}
                            </div>
                            <div class="w-full md:w-auto text-left md:text-right">
                                <p class="text-sm text-gray-500 mb-1">สถานะเอกสาร</p>
                                <select onchange="handleStatusChange(event)" class="block w-full md:w-48 text-sm rounded-md border p-2 font-bold outline-none transition-colors cursor-pointer 
                                    ${doc.status === 'completed' ? 'bg-green-100 text-green-800 border-green-200' : 
                                      doc.status === 'pending' ? 'bg-blue-100 text-blue-800 border-blue-200' : 'bg-red-100 text-red-800 border-red-200'}">
                                    <option value="completed" ${doc.status === 'completed' ? 'selected' : ''} class="bg-white text-gray-900">โอนจัดสรรแล้ว</option>
                                    <option value="pending" ${doc.status === 'pending' ? 'selected' : ''} class="bg-white text-gray-900">อยู่ระหว่างดำเนินการ</option>
                                    <option value="untransferred" ${doc.status === 'untransferred' ? 'selected' : ''} class="bg-white text-gray-900">ยังไม่โอนจัดสรร</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="flex items-start gap-3"><i data-lucide="calendar" class="w-5 h-5 text-gray-400 mt-0.5"></i><div><p class="text-sm font-medium text-gray-500">วันที่ทำรายการ</p><p class="text-gray-900">${new Date(doc.date).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}</p></div></div>
                            <div class="flex items-start gap-3"><i data-lucide="map-pin" class="w-5 h-5 text-blue-500 mt-0.5"></i><div><p class="text-sm font-medium text-blue-600">หน่วยงานปลายทาง (ผู้รับ)</p><p class="text-gray-900 font-medium">${escapeHTML(doc.destination)}</p></div></div>
                        </div>
                    </div>

                    <div class="p-6 md:p-8 border-t border-gray-100 bg-gray-50/30">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 divide-y md:divide-y-0 md:divide-x divide-gray-100">
                            <!-- Progress 1 -->
                            <div class="flex flex-col sm:flex-row items-center justify-center gap-6 p-2">
                                ${renderSemiCircleGauge(itemsPercent, "#10b981")}
                                <div class="flex flex-col space-y-3">
                                   <h4 class="text-gray-600 font-bold text-sm text-center sm:text-left">ความคืบหน้าการจัดซื้อ</h4>
                                   <div class="text-center sm:text-left">
                                     <p class="text-xs text-gray-400 font-medium">สถานะปัจจุบัน</p>
                                     <p class="text-xl font-bold ${itemsPercent === 100 ? 'text-green-600' : 'text-blue-600'}">
                                       ${itemsPercent === 100 ? 'ดำเนินการแล้วเสร็จ' : 'กำลังดำเนินการ'}
                                     </p>
                                   </div>
                                   <div class="flex items-center justify-center sm:justify-start gap-2 text-sm text-gray-600 font-medium">
                                     <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
                                     ผลสำเร็จ: ${purchasedItemsCount} / ${totalItemsCount} รายการ
                                   </div>
                                </div>
                            </div>
                            <!-- Progress 2 -->
                            <div class="flex flex-col sm:flex-row items-center justify-center gap-6 p-2 md:pl-8">
                                ${renderSemiCircleGauge(moneyPercent, "#3b82f6")}
                                <div class="flex flex-col space-y-3 w-full max-w-[200px]">
                                   <h4 class="text-gray-600 font-bold text-sm text-center sm:text-left">งบประมาณ</h4>
                                   <div class="text-center sm:text-left">
                                     <p class="text-xs text-gray-400 font-medium">จำนวนเงินที่ได้รับจัดสรร</p>
                                     <p class="text-xl font-bold text-gray-900">${formatNumber(grandTotal)} บ.</p>
                                   </div>
                                   <div class="flex flex-col text-sm text-gray-600 font-medium space-y-1.5">
                                     <div class="flex items-center gap-2">
                                       <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span>
                                       <span>ใช้ไป: ${formatNumber(purchasedTotal)} บ.</span>
                                     </div>
                                     <div class="flex items-center gap-2">
                                       <span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
                                       <span>เหลือ: ${formatNumber(grandTotal - purchasedTotal)} บ.</span>
                                     </div>
                                   </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ตารางรายการครุภัณฑ์ -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4 bg-gray-50 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2"><i data-lucide="package" class="text-gray-600 w-5 h-5"></i> รายการครุภัณฑ์ที่โอนจัดสรร</h3>
                            <p class="text-sm text-gray-500 mt-1">ยอดเงินรวมทั้งสิ้น: <span class="font-bold text-green-600">${formatNumber(grandTotal)} บาท</span></p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleExpandAll()" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-3 py-2 rounded-lg flex items-center gap-1.5 text-sm font-medium transition-colors">
                                ${isAllExpanded ? '<i data-lucide="chevrons-up" class="w-4 h-4"></i> ย่อทั้งหมด' : '<i data-lucide="chevrons-down" class="w-4 h-4"></i> ขยายทั้งหมด'}
                            </button>
                            <button onclick="openGroupModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg flex items-center gap-1.5 text-sm font-medium transition-colors">
                                <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มหัวข้อหลัก
                            </button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-16">ลำดับ</th>
                                    <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-48">หมายเลขครุภัณฑ์</th>
                                    <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase">รายการ</th>
                                    <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-32">จำนวนเงิน (บาท)</th>
                                    <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-40">สถานะ</th>
                                    <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase w-24">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                ${relatedGroups.length === 0 ? `
                                <tr>
                                    <td colspan="6" class="px-6 py-10 text-center text-gray-500">
                                        ยังไม่มีรายการครุภัณฑ์ กรุณากดปุ่ม <b>"เพิ่มหัวข้อหลัก"</b>
                                    </td>
                                </tr>
                                ` : ''}

                                ${relatedGroups.map((group, gIndex) => {
                                    const isExpanded = state.expandedGroups.includes(group.id);
                                    const groupTotal = group.items.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
                                    const isAllPurchased = group.items.length > 0 && group.items.every(item => item.itemStatus === 'purchased');
                                    
                                    let html = `
                                    <tr class="hover:bg-slate-200 cursor-pointer transition-colors border-b border-gray-200 ${isExpanded ? 'bg-slate-200 shadow-inner' : 'bg-slate-100'}" onclick="toggleGroupExpand('${group.id}')">
                                        <td class="px-4 py-4 text-sm font-extrabold text-slate-900 border-l-4 ${isExpanded ? 'border-slate-500' : 'border-transparent hover:border-slate-400'}">
                                            <div class="flex items-center gap-2">
                                                <i data-lucide="${isExpanded ? 'chevron-down' : 'chevron-right'}" class="w-4 h-4 text-slate-700"></i>
                                                ${gIndex + 1}
                                            </div>
                                        </td>
                                        <td class="px-4 py-4 text-center text-sm font-medium text-slate-400"></td>
                                        <td class="px-4 py-4 text-sm font-extrabold text-slate-900 whitespace-pre-wrap leading-relaxed">${escapeHTML(group.title)}</td>
                                        <td class="px-4 py-4 text-sm font-extrabold text-slate-800 text-right">${groupTotal > 0 ? formatNumber(groupTotal) : '-'}</td>
                                        <td class="px-4 py-4 text-center">
                                            ${group.items.length > 0 ? `<span class="inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-full border ${isAllPurchased ? 'bg-green-100 text-green-800 border-green-300' : 'bg-yellow-100 text-yellow-800 border-yellow-300'}">${isAllPurchased ? 'จัดซื้อแล้ว' : 'อยู่ระหว่างจัดซื้อ'}</span>` : ''}
                                        </td>
                                        <td class="px-4 py-4 text-center relative">
                                            <button onclick="toggleMenu(event, '${group.id}')" class="text-slate-600 hover:bg-slate-300 p-1.5 rounded-full transition-colors outline-none"><i data-lucide="more-vertical" class="w-5 h-5"></i></button>
                                            
                                            ${state.activeMenu === group.id ? `
                                            <div class="fixed inset-0 z-40 cursor-default" onclick="closeMenu(event)"></div>
                                            <div class="absolute right-8 top-8 w-48 bg-white rounded-lg shadow-lg border border-gray-100 z-50 py-1 text-left cursor-default" onclick="event.stopPropagation()">
                                                <button onclick="openSubItemModal('${group.id}')" class="w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4 text-green-600"></i> เพิ่มรายการย่อย</button>
                                                <button onclick="openGroupModal('${group.id}')" class="w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2"><i data-lucide="edit" class="w-4 h-4 text-blue-600"></i> แก้ไขหัวข้อหลัก</button>
                                                <div class="border-t border-gray-100 my-1"></div>
                                                <button onclick="confirmDelete('group', '${group.id}')" class="w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2"><i data-lucide="trash-2" class="w-4 h-4"></i> ลบหัวข้อหลัก</button>
                                            </div>
                                            ` : ''}
                                        </td>
                                    </tr>
                                    `;

                                    if (isExpanded) {
                                        if (group.items.length === 0) {
                                            html += `
                                            <tr class="bg-white">
                                                <td class="px-4 py-3"></td>
                                                <td colspan="5" class="px-4 py-4 text-sm text-gray-400 text-center italic">
                                                    ยังไม่มีรายการย่อย คลิก <button onclick="openSubItemModal('${group.id}', event)" class="inline-flex items-center text-green-600 hover:underline"><i data-lucide="plus-circle" class="w-3 h-3 mx-1"></i> เพิ่มรายการย่อย</button> เพื่อเพิ่มข้อมูล
                                                </td>
                                            </tr>`;
                                        } else {
                                            html += group.items.map(item => `
                                            <tr class="bg-white hover:bg-gray-50 transition-colors">
                                                <td class="px-4 py-3"></td>
                                                <td class="px-4 py-3 text-sm text-blue-600 font-mono">${escapeHTML(item.assetNumber) || '-'}</td>
                                                <td class="px-4 py-3 text-sm text-gray-700"><div class="flex items-start"><span class="mr-2 text-gray-400">-</span><span class="whitespace-pre-wrap">${escapeHTML(item.description)}</span></div></td>
                                                <td class="px-4 py-3 text-sm text-gray-700 text-right font-mono">${formatNumber(item.price)}</td>
                                                <td class="px-4 py-3 text-center">
                                                    <span class="inline-flex items-center text-xs font-semibold px-2.5 py-1 rounded-full border ${item.itemStatus === 'purchased' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}">
                                                        ${item.itemStatus === 'purchased' ? 'จัดซื้อแล้ว' : 'อยู่ระหว่างจัดซื้อ'}
                                                    </span>
                                                </td>
                                                <td class="px-4 py-3 text-center relative">
                                                    <button onclick="toggleMenu(event, '${item.id}')" class="text-gray-400 hover:bg-gray-100 hover:text-gray-600 p-1.5 rounded-full transition-colors outline-none"><i data-lucide="more-vertical" class="w-4 h-4"></i></button>
                                                    
                                                    ${state.activeMenu === item.id ? `
                                                    <div class="fixed inset-0 z-40 cursor-default" onclick="closeMenu(event)"></div>
                                                    <div class="absolute right-8 top-8 w-36 bg-white rounded-lg shadow-lg border border-gray-100 z-50 py-1 text-left cursor-default" onclick="event.stopPropagation()">
                                                        <button onclick="openSubItemModal('${group.id}', '${item.id}')" class="w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2"><i data-lucide="edit" class="w-4 h-4 text-blue-600"></i> แก้ไข</button>
                                                        <button onclick="confirmDelete('sub', '${group.id}', '${item.id}')" class="w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2"><i data-lucide="trash-2" class="w-4 h-4"></i> ลบ</button>
                                                    </div>
                                                    ` : ''}
                                                </td>
                                            </tr>
                                            `).join('');
                                        }
                                    }
                                    return html;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- ส่วนปุ่มบันทึกและแนบไฟล์ (ล่างสุด) -->
                <div class="flex flex-col sm:flex-row justify-end items-center gap-3 pt-4 pb-8">
                    <label class="cursor-pointer bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-5 py-2.5 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-colors w-full sm:w-auto shadow-sm">
                        <i data-lucide="paperclip" class="w-4 h-4 text-gray-500"></i>
                        <span class="truncate max-w-[150px]">${doc.attachedFile ? escapeHTML(doc.attachedFile) : 'แนบใบโอนจัดสรร'}</span>
                        <input type="file" class="hidden" onchange="handleAttachFile(event)" accept=".pdf,.jpg,.jpeg,.png" />
                    </label>
                    <button onclick="saveDocumentDetail()" ${state.isSavingDoc ? 'disabled' : ''} class="px-6 py-2.5 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-all w-full sm:w-auto shadow-sm
                        ${state.saveSuccess ? 'bg-green-600 text-white hover:bg-green-700' : 'bg-blue-600 text-white hover:bg-blue-700'} 
                        ${state.isSavingDoc ? 'opacity-80 cursor-not-allowed' : ''}">
                        ${state.isSavingDoc ? '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> กำลังบันทึก...' : 
                          state.saveSuccess ? '<i data-lucide="check-circle" class="w-4 h-4"></i> บันทึกสำเร็จ' : 
                          '<i data-lucide="save" class="w-4 h-4"></i> บันทึกข้อมูลเอกสาร'}
                    </button>
                </div>
            </div>
            `;
        }

        // --- UI Helper Functions ---
        function renderStatusBadge(status) {
            if (status === 'completed') return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800"><i data-lucide="check-circle" class="w-3 h-3 mr-1"></i> โอนจัดสรรแล้ว</span>`;
            if (status === 'pending') return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> อยู่ระหว่างดำเนินการ</span>`;
            if (status === 'untransferred') return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800"><i data-lucide="x" class="w-3 h-3 mr-1"></i> ยังไม่โอนจัดสรร</span>`;
            return '';
        }

        function renderSemiCircleGauge(percent, color) {
            const radius = 40;
            const circumference = Math.PI * radius;
            const strokeDashoffset = circumference - (percent / 100) * circumference;
            return `
            <div class="relative flex flex-col items-center justify-center w-36 h-24">
                <svg class="w-full h-full overflow-visible" viewBox="0 0 100 55">
                    <path d="M 10,45 A 40,40 0 0,1 90,45" fill="none" stroke="#e5e7eb" stroke-width="10" stroke-linecap="round" />
                    <path d="M 10,45 A 40,40 0 0,1 90,45" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${strokeDashoffset}" class="transition-all duration-1000 ease-out" />
                </svg>
                <div class="absolute bottom-1 flex flex-col items-center">
                    <span class="text-3xl font-black text-gray-900">${percent}%</span>
                </div>
            </div>
            `;
        }

        // --- Modals Renderers ---
        function renderCreateModal() {
            if (!state.modals.create) return '';
            return `
            <div class="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-50 px-4">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden animate-in zoom-in-95 flex flex-col max-h-[90vh]">
                    <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50 shrink-0">
                        <h3 class="text-lg font-bold text-gray-800">สร้างใบโอนจัดสรรใหม่</h3>
                        <button onclick="closeModal('create')" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="flex border-b border-gray-200 shrink-0">
                        <button onclick="setCreateMode('manual')" class="flex-1 py-3 text-sm font-medium border-b-2 outline-none ${state.createMode === 'manual' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}">กรอกข้อมูลเอง</button>
                        <button onclick="setCreateMode('excel')" class="flex-1 py-3 text-sm font-medium border-b-2 outline-none flex justify-center items-center gap-2 ${state.createMode === 'excel' ? 'border-green-600 text-green-600' : 'border-transparent text-gray-500'}"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i> อัปโหลดไฟล์ Excel</button>
                    </div>
                    <div class="overflow-y-auto p-6">
                        ${state.createMode === 'manual' ? `
                        <form id="createDocForm" onsubmit="handleCreateManualSubmit(event)" class="space-y-4">
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">หมายเลขใบโอน</label><input type="text" id="createDocId" required class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">วันที่โอน</label><input type="date" id="createDocDate" required class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">ปลายทาง</label><input type="text" id="createDocDest" required class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div>
                        </form>
                        ` : `
                        <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors relative">
                            <input type="file" accept=".xlsx, .xls, .csv" onchange="handleExcelUpload(event, 'doc')" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            ${state.isParsing ? `
                                <div class="flex flex-col items-center text-blue-600"><i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-3"></i><p class="font-medium">กำลังอ่านข้อมูล...</p></div>
                            ` : state.parsedCreateData ? `
                                <div class="flex flex-col items-center text-green-600"><i data-lucide="check-circle" class="w-10 h-10 mb-3"></i><p class="font-medium">อ่านข้อมูลสำเร็จ: ${state.createFileName}</p><p class="text-sm mt-2 text-gray-600">พบ ${state.parsedCreateData.items.length} รายการ</p></div>
                            ` : `
                                <i data-lucide="upload-cloud" class="w-12 h-12 text-gray-400 mb-3 mx-auto"></i>
                                <p class="text-lg font-medium text-gray-700 mb-1">ลากไฟล์มาวาง หรือ คลิกเพื่อเลือกไฟล์</p>
                                <p class="text-sm text-gray-500">รองรับไฟล์ .xlsx, .xls, .csv</p>
                                <p class="text-xs text-blue-500 mt-2 inline-block bg-blue-50 px-3 py-1 rounded-full border border-blue-100">รูปแบบคอลัมน์: A=หมายเลข, B=รายการ, C=ราคา</p>
                            `}
                        </div>
                        `}
                    </div>
                    <div class="p-4 border-t border-gray-100 bg-gray-50 flex gap-3">
                        <button onclick="closeModal('create')" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">ยกเลิก</button>
                        ${state.createMode === 'manual' ? 
                          `<button type="submit" form="createDocForm" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">สร้างและไปเพิ่มรายการ</button>` : 
                          `<button onclick="handleCreateExcelSubmit()" ${!state.parsedCreateData ? 'disabled' : ''} class="flex-1 px-4 py-2 rounded-lg transition-colors ${state.parsedCreateData ? 'bg-green-600 text-white hover:bg-green-700' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}">ยืนยันนำเข้า</button>`}
                    </div>
                </div>
            </div>
            `;
        }

        function renderGroupModal() {
            if (!state.modals.group) return '';
            const isEdit = state.editingGroup !== null;
            const titleValue = isEdit ? escapeHTML(state.editingGroup.title) : '';
            return `
            <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black bg-opacity-50 px-4">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden animate-in zoom-in-95">
                    <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
                        <h3 class="text-lg font-bold text-gray-800">${isEdit ? 'แก้ไขหัวข้อหลัก' : 'เพิ่มหัวข้อหลักใหม่'}</h3>
                        <button onclick="closeModal('group')" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <form id="groupForm" onsubmit="handleGroupSubmit(event)" class="p-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อหัวข้อหลัก</label>
                            <textarea id="groupTitleInput" required class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 min-h-[100px]" placeholder="เช่น 1. รายการ ชุดโต๊ะทำงาน เก้าอี้ทำงาน...">${titleValue}</textarea>
                        </div>
                        <div class="pt-4 flex gap-3">
                            <button type="button" onclick="closeModal('group')" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">ยกเลิก</button>
                            <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">บันทึก</button>
                        </div>
                    </form>
                </div>
            </div>
            `;
        }

        function renderSubItemModal() {
            if (!state.modals.subItem) return '';
            const isEdit = state.editingSubItem !== null;
            const item = state.editingSubItem || { assetNumber: '', description: '', price: '', itemStatus: 'pending' };

            return `
            <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black bg-opacity-50 px-4">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-xl overflow-hidden animate-in zoom-in-95 flex flex-col max-h-[90vh]">
                    <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50 shrink-0">
                        <h3 class="text-lg font-bold text-gray-800">${isEdit ? 'แก้ไขรายการย่อย' : 'เพิ่มรายการย่อย'}</h3>
                        <button onclick="closeModal('subItem')" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>

                    ${!isEdit ? `
                    <div class="flex border-b border-gray-200 shrink-0">
                        <button onclick="setSubItemMode('manual')" class="flex-1 py-3 text-sm font-medium border-b-2 outline-none transition-colors ${state.subItemCreateMode === 'manual' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}">กรอกข้อมูลเอง</button>
                        <button onclick="setSubItemMode('excel')" class="flex-1 py-3 text-sm font-medium border-b-2 outline-none transition-colors flex items-center justify-center gap-2 ${state.subItemCreateMode === 'excel' ? 'border-green-600 text-green-600' : 'border-transparent text-gray-500 hover:text-gray-700'}"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i> อัปโหลดไฟล์ Excel</button>
                    </div>
                    ` : ''}

                    <div class="overflow-y-auto p-6">
                        ${state.subItemCreateMode === 'manual' ? `
                        <form id="subItemForm" onsubmit="handleSubItemSubmit(event)" class="space-y-4">
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">หมายเลขครุภัณฑ์ (ถ้ามี)</label><input type="text" id="subAsset" value="${escapeHTML(item.assetNumber)}" class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="เช่น IT-67-001 หรือ IT-001 ถึง 005" /></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียดรายการ</label><input type="text" id="subDesc" required value="${escapeHTML(item.description)}" class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="เช่น - ชุดโต๊ะทำงานระดับปฏิบัติการ จำนวน 1 ชุด" /></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-1">จำนวนเงิน (บาท)</label><input type="number" id="subPrice" required value="${item.price}" class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00" /></div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">สถานะ</label>
                                <select id="subStatus" class="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="pending" ${item.itemStatus === 'pending' ? 'selected' : ''}>อยู่ระหว่างจัดซื้อ</option>
                                    <option value="purchased" ${item.itemStatus === 'purchased' ? 'selected' : ''}>จัดซื้อแล้ว</option>
                                </select>
                            </div>
                        </form>
                        ` : `
                        <div class="space-y-6">
                            ${!state.parsedSubItems ? `
                            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors relative">
                                <input type="file" accept=".xlsx, .xls, .csv" onchange="handleExcelUpload(event, 'subItem')" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                ${state.isSubItemParsing ? `
                                <div class="flex flex-col items-center text-blue-600"><i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-3"></i><p class="font-medium">กำลังอ่านข้อมูล...</p></div>
                                ` : `
                                <i data-lucide="upload-cloud" class="w-12 h-12 text-gray-400 mb-3 mx-auto"></i>
                                <p class="text-lg font-medium text-gray-700 mb-1">ลากไฟล์มาวาง หรือ คลิกเพื่อเลือกไฟล์</p>
                                <p class="text-sm">รองรับไฟล์ .xlsx, .xls, .csv สำหรับนำเข้ารายการย่อยทีละหลายรายการ</p>
                                <p class="text-xs text-blue-500 mt-2 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 inline-block">รูปแบบคอลัมน์: A=หมายเลข, B=รายการ, C=ราคา</p>
                                `}
                            </div>
                            ` : `
                            <div class="space-y-4 animate-in">
                                <div class="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg flex items-start gap-3">
                                    <i data-lucide="file-spreadsheet" class="w-5 h-5 mt-0.5"></i>
                                    <div class="flex-1">
                                        <p class="font-medium">อ่านข้อมูลสำเร็จ: ${state.subItemFileName}</p>
                                        <p class="text-sm opacity-80">พบรายการที่ต้องการนำเข้า ${state.parsedSubItems.length} รายการ</p>
                                    </div>
                                    <button onclick="clearSubItemExcel()" class="text-sm text-green-700 underline font-medium whitespace-nowrap outline-none">เปลี่ยนไฟล์</button>
                                </div>
                                <div class="border border-gray-200 rounded-lg overflow-hidden">
                                    <div class="bg-gray-50 px-4 py-2 border-b border-gray-200 text-sm font-semibold text-gray-700">ตัวอย่างรายการนำเข้า (Preview)</div>
                                    <table class="min-w-full divide-y divide-gray-200 text-sm">
                                        <thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left text-gray-500">หมายเลข</th><th class="px-4 py-2 text-left text-gray-500">รายการ</th><th class="px-4 py-2 text-right text-gray-500">ราคา</th></tr></thead>
                                        <tbody class="divide-y divide-gray-200 bg-white">
                                            ${state.parsedSubItems.slice(0,5).map(i => `<tr><td class="px-4 py-2 text-gray-900">${escapeHTML(i.assetNumber) || '-'}</td><td class="px-4 py-2 text-gray-700 truncate max-w-[200px]">${escapeHTML(i.description)}</td><td class="px-4 py-2 text-gray-500 text-right">${formatNumber(i.price)}</td></tr>`).join('')}
                                            ${state.parsedSubItems.length > 5 ? `<tr><td colspan="3" class="px-4 py-2 text-center text-gray-500 italic">... และอีก ${state.parsedSubItems.length - 5} รายการ</td></tr>` : ''}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            `}
                        </div>
                        `}
                    </div>
                    
                    <div class="p-4 border-t border-gray-100 bg-gray-50 flex gap-3 shrink-0">
                        <button type="button" onclick="closeModal('subItem')" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">ยกเลิก</button>
                        ${state.subItemCreateMode === 'manual' ? `
                            <button type="submit" form="subItemForm" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">${isEdit ? 'บันทึกการแก้ไข' : 'เพิ่มรายการ'}</button>
                        ` : `
                            <button type="button" onclick="handleExcelSubItemSubmit()" ${!state.parsedSubItems ? 'disabled' : ''} class="flex-1 px-4 py-2 rounded-lg font-medium transition-colors ${state.parsedSubItems ? 'bg-green-600 hover:bg-green-700 text-white shadow-sm' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}">นำเข้ารายการย่อย</button>
                        `}
                    </div>
                </div>
            </div>
            `;
        }

        function renderDeleteConfirmModal() {
            if (!state.modals.delete) return '';
            const msg = state.deleteTarget.type === 'group' 
                ? 'คุณต้องการลบหัวข้อหลักนี้และรายการย่อยทั้งหมดใช่หรือไม่?' 
                : 'คุณต้องการลบรายการย่อยนี้ใช่หรือไม่?';

            return `
            <div class="fixed inset-0 z-[80] flex items-center justify-center bg-black bg-opacity-50 px-4">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-in zoom-in-95">
                    <div class="p-6">
                        <h3 class="text-lg font-bold text-gray-800 mb-2">ยืนยันการลบ</h3>
                        <p class="text-gray-600 text-sm mb-6">${msg}</p>
                        <div class="flex gap-3">
                            <button onclick="closeModal('delete')" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">ยกเลิก</button>
                            <button onclick="executeDelete()" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">ลบข้อมูล</button>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        function renderFilePreviewModal() {
            if (!state.modals.preview || !state.previewFile) return '';
            const isImage = state.previewFile.type && state.previewFile.type.startsWith('image/');

            return `
            <div class="fixed inset-0 z-[90] flex items-center justify-center bg-black bg-opacity-75 px-4" onclick="closeModal('preview')">
                <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-center p-4 border-b border-gray-200 bg-gray-50 shrink-0">
                        <h3 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                            <i data-lucide="paperclip" class="w-5 h-5 text-blue-600"></i> ${escapeHTML(state.previewFile.name)}
                        </h3>
                        <button onclick="closeModal('preview')" class="text-gray-500 hover:text-gray-800 bg-gray-200 hover:bg-gray-300 p-1.5 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="flex-1 overflow-auto p-4 bg-gray-100 flex items-center justify-center min-h-[50vh]">
                        ${isImage ? `
                            <img src="${state.previewFile.url}" alt="preview" class="max-w-full max-h-full object-contain shadow-sm border border-gray-200 bg-white" />
                        ` : `
                            <iframe src="${state.previewFile.url}" class="w-full h-full min-h-[60vh] border-0 bg-white shadow-sm" title="File Preview"></iframe>
                        `}
                    </div>
                    <div class="p-4 border-t border-gray-200 bg-white flex justify-end shrink-0">
                        <a href="${state.previewFile.url}" download="${state.previewFile.name}" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2 text-sm font-medium transition-colors">
                            ดาวน์โหลดไฟล์
                        </a>
                    </div>
                </div>
            </div>
            `;
        }

        // --- 3. ฟังก์ชันการจัดการ (Event Handlers) ---
        
        // Navigation / Main Actions
        window.handleViewDocument = (id) => {
            state.selectedDocId = id;
            state.view = 'detail';
            state.saveSuccess = false;
            // Auto-expand all groups in this doc
            const groupsInDoc = state.equipmentGroups.filter(g => g.docId === id).map(g => g.id);
            state.expandedGroups = groupsInDoc;
            render();
        };

        window.handleBackToList = () => {
            state.selectedDocId = null;
            state.view = 'list';
            state.saveSuccess = false;
            render();
        };

        window.handleSearch = (e) => {
            state.searchTerm = e.target.value;
            render();
            // Restore focus after render
            const input = document.getElementById('searchInput');
            if(input) {
                input.focus();
                const val = input.value;
                input.value = '';
                input.value = val;
            }
        };

        window.handleStatusChange = (e) => {
            const newStatus = e.target.value;
            const docIndex = state.documents.findIndex(d => d.id === state.selectedDocId);
            if (docIndex > -1) {
                state.documents[docIndex].status = newStatus;
                render();
            }
        };

        window.saveDocumentDetail = () => {
            state.isSavingDoc = true;
            state.saveSuccess = false;
            render();

            setTimeout(() => {
                state.isSavingDoc = false;
                state.saveSuccess = true;
                render();
                setTimeout(() => {
                    state.saveSuccess = false;
                    render();
                }, 3000);
            }, 800);
        };

        window.handleAttachFile = (e) => {
            const file = e.target.files[0];
            if (file && state.selectedDocId) {
                const fileUrl = URL.createObjectURL(file);
                const docIndex = state.documents.findIndex(d => d.id === state.selectedDocId);
                if (docIndex > -1) {
                    state.documents[docIndex].attachedFile = file.name;
                    state.documents[docIndex].attachedFileUrl = fileUrl;
                    state.documents[docIndex].fileType = file.type;
                    render();
                }
            }
        };

        window.handleOpenPreview = (id) => {
            // ค้นหาเอกสารต้นทาง (กรณีที่มีการส่ง id เข้ามา ไม่ใช่ส่ง doc object)
            const doc = state.documents.find(d => d.id === id);
            if (!doc) return;

            if (doc.attachedFileUrl) {
                state.previewFile = { url: doc.attachedFileUrl, name: doc.attachedFile, type: doc.fileType };
                state.modals.preview = true;
                render();
            } else if (doc.attachedFile) {
                alert(`ไม่สามารถเปิดภาพตัวอย่างได้: "${doc.attachedFile}" เป็นเพียงข้อมูลจำลองและไม่มีเนื้อหาไฟล์จริงอยู่ในระบบ`);
            }
        };

        // UI Interactions
        window.toggleGroupExpand = (groupId) => {
            if (state.expandedGroups.includes(groupId)) {
                state.expandedGroups = state.expandedGroups.filter(id => id !== groupId);
            } else {
                state.expandedGroups.push(groupId);
            }
            render();
        };

        window.toggleExpandAll = () => {
            const relatedGroups = state.equipmentGroups.filter(g => g.docId === state.selectedDocId);
            const allGroupIds = relatedGroups.map(g => g.id);
            const isAllExpanded = allGroupIds.length > 0 && state.expandedGroups.length === allGroupIds.length;
            
            if (isAllExpanded) {
                state.expandedGroups = [];
            } else {
                state.expandedGroups = allGroupIds;
            }
            render();
        };

        window.toggleMenu = (e, id) => {
            e.stopPropagation();
            state.activeMenu = state.activeMenu === id ? null : id;
            render();
        };

        window.closeMenu = (e) => {
            if(e) e.stopPropagation();
            state.activeMenu = null;
            render();
        };

        window.closeModal = (modalName) => {
            state.modals[modalName] = false;
            if (modalName === 'create') {
                state.createMode = 'manual';
                state.parsedCreateData = null;
                state.createFileName = null;
            }
            if (modalName === 'subItem') {
                state.subItemCreateMode = 'manual';
                state.parsedSubItems = null;
                state.subItemFileName = null;
            }
            render();
        };

        // Create Document Methods
        window.openCreateModal = () => {
            state.modals.create = true;
            render();
        };

        window.setCreateMode = (mode) => {
            state.createMode = mode;
            render();
        };

        window.handleCreateManualSubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('createDocId').value;
            const date = document.getElementById('createDocDate').value;
            const dest = document.getElementById('createDocDest').value;

            if (!id || !date || !dest) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');

            const newDoc = { id, date, destination: dest, status: 'untransferred', creator: 'ผู้ใช้ระบบ', notes: '-', attachedFile: null };
            state.documents.unshift(newDoc);
            
            closeModal('create');
            handleViewDocument(newDoc.id);
        };

        window.handleCreateExcelSubmit = () => {
            if (!state.parsedCreateData) return;
            const data = state.parsedCreateData;

            const newDoc = { id: data.id, date: data.date, destination: data.destination, status: 'untransferred', creator: 'ผู้ใช้ระบบ', notes: `นำเข้าจากไฟล์: ${state.createFileName}`, attachedFile: null };
            const newGroup = {
                id: `g-${Date.now()}`,
                docId: newDoc.id,
                title: `รายการนำเข้าจาก Excel (${state.createFileName})`,
                items: data.items.map((item, i) => ({ ...item, id: `i-ex-${Date.now()}-${i}` }))
            };

            state.documents.unshift(newDoc);
            state.equipmentGroups.push(newGroup);
            state.expandedGroups.push(newGroup.id);
            
            closeModal('create');
            handleViewDocument(newDoc.id);
        };

        // Group Methods
        window.openGroupModal = (groupId = null) => {
            state.activeMenu = null;
            if (groupId) {
                const group = state.equipmentGroups.find(g => g.id === groupId);
                state.editingGroup = group ? JSON.parse(JSON.stringify(group)) : null;
            } else {
                state.editingGroup = null;
            }
            state.modals.group = true;
            render();
        };

        window.handleGroupSubmit = (e) => {
            e.preventDefault();
            const title = document.getElementById('groupTitleInput').value;
            
            if (state.editingGroup) {
                const index = state.equipmentGroups.findIndex(g => g.id === state.editingGroup.id);
                if (index > -1) state.equipmentGroups[index].title = title;
            } else {
                const newGroup = { id: `g-${Date.now()}`, docId: state.selectedDocId, title, items: [] };
                state.equipmentGroups.push(newGroup);
                state.expandedGroups.push(newGroup.id);
            }
            closeModal('group');
        };

        // SubItem Methods
        window.openSubItemModal = (groupId, itemId = null) => {
            state.activeMenu = null;
            state.targetGroupId = groupId;
            
            if (itemId) {
                const group = state.equipmentGroups.find(g => g.id === groupId);
                const item = group.items.find(i => i.id === itemId);
                state.editingSubItem = item ? JSON.parse(JSON.stringify(item)) : null;
                state.subItemCreateMode = 'manual'; // แก้ไขต้องเป็นแบบกรอกฟอร์มเท่านั้น
            } else {
                state.editingSubItem = null;
            }

            if (!state.expandedGroups.includes(groupId)) {
                state.expandedGroups.push(groupId);
            }
            
            state.modals.subItem = true;
            render();
        };

        window.setSubItemMode = (mode) => {
            state.subItemCreateMode = mode;
            render();
        };

        window.handleSubItemSubmit = (e) => {
            e.preventDefault();
            const assetNumber = document.getElementById('subAsset').value;
            const description = document.getElementById('subDesc').value;
            const price = Number(document.getElementById('subPrice').value);
            const itemStatus = document.getElementById('subStatus').value;

            const groupIndex = state.equipmentGroups.findIndex(g => g.id === state.targetGroupId);
            if (groupIndex === -1) return;

            if (state.editingSubItem) {
                const itemIndex = state.equipmentGroups[groupIndex].items.findIndex(i => i.id === state.editingSubItem.id);
                if (itemIndex > -1) {
                    state.equipmentGroups[groupIndex].items[itemIndex] = { ...state.editingSubItem, assetNumber, description, price, itemStatus };
                }
            } else {
                state.equipmentGroups[groupIndex].items.push({ id: `i-${Date.now()}`, assetNumber, description, price, itemStatus });
            }
            closeModal('subItem');
        };

        window.handleExcelSubItemSubmit = () => {
            if (!state.parsedSubItems) return;
            const groupIndex = state.equipmentGroups.findIndex(g => g.id === state.targetGroupId);
            if (groupIndex === -1) return;

            const newItems = state.parsedSubItems.map((item, i) => ({
                id: `i-ex-${Date.now()}-${i}`,
                assetNumber: item.assetNumber,
                description: item.description,
                price: Number(item.price),
                itemStatus: item.itemStatus
            }));

            state.equipmentGroups[groupIndex].items.push(...newItems);
            closeModal('subItem');
        };

        window.clearSubItemExcel = () => {
            state.parsedSubItems = null;
            state.subItemFileName = null;
            render();
        };

        // Delete Methods
        window.confirmDelete = (type, groupId, itemId = null) => {
            state.activeMenu = null;
            state.deleteTarget = { type, groupId, itemId };
            state.modals.delete = true;
            render();
        };

        window.executeDelete = () => {
            const { type, groupId, itemId } = state.deleteTarget;
            if (type === 'group') {
                state.equipmentGroups = state.equipmentGroups.filter(g => g.id !== groupId);
            } else if (type === 'sub') {
                const groupIndex = state.equipmentGroups.findIndex(g => g.id === groupId);
                if (groupIndex > -1) {
                    state.equipmentGroups[groupIndex].items = state.equipmentGroups[groupIndex].items.filter(i => i.id !== itemId);
                }
            }
            closeModal('delete');
        };

        // Excel Parser Engine
        window.handleExcelUpload = (e, context) => {
            const file = e.target.files[0];
            if (!file) return;

            if (context === 'doc') {
                state.isParsing = true;
                state.createFileName = file.name;
            } else {
                state.isSubItemParsing = true;
                state.subItemFileName = file.name;
            }
            render();

            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

                    const parsedItems = [];
                    rows.forEach((row, index) => {
                        if (!row || row.length < 2) return;
                        const priceVal = parseFloat(row[2]);
                        if (index === 0 && isNaN(priceVal) && typeof row[1] === 'string') return; // Skip Header
                        
                        parsedItems.push({
                            assetNumber: row[0] ? String(row[0]) : '',
                            description: row[1] ? String(row[1]) : '',
                            price: isNaN(priceVal) ? 0 : priceVal,
                            itemStatus: 'pending'
                        });
                    });

                    if (context === 'doc') {
                        state.parsedCreateData = {
                            id: `TR-EX-${Math.floor(1000 + Math.random() * 9000)}`,
                            date: new Date().toISOString().split('T')[0],
                            destination: 'รอระบุปลายทาง',
                            items: parsedItems
                        };
                        state.isParsing = false;
                    } else {
                        state.parsedSubItems = parsedItems;
                        state.isSubItemParsing = false;
                    }
                    render();
                } catch (err) {
                    console.error(err);
                    alert('เกิดข้อผิดพลาดในการอ่านไฟล์ Excel (กรุณาใช้ไฟล์ .xlsx หรือ .csv)');
                    if (context === 'doc') state.isParsing = false;
                    else state.isSubItemParsing = false;
                    render();
                }
            };
            reader.readAsArrayBuffer(file);
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            render();
            // Close menu if clicked outside
            document.addEventListener('click', () => {
                if (state.activeMenu) {
                    state.activeMenu = null;
                    render();
                }
            });
        });

    </script>
</body>
</html>
